function renderSolutionTab(p) {
  var hid = p.id;
  function colorize(sql) {
    return sql
      .replace(/\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP BY|ORDER BY|HAVING|LIMIT|OFFSET|UNION|ALL|WITH|RECURSIVE|AS|DISTINCT|CASE|WHEN|THEN|ELSE|END|AND|OR|NOT|IN|EXISTS|BETWEEN|LIKE|IS|NULL|INSERT|UPDATE|DELETE|SET|COUNT|SUM|AVG|MIN|MAX|COALESCE|IF|IFNULL|OVER|PARTITION|ROW_NUMBER|RANK|DENSE_RANK|LAG|LEAD|ROWS|RANGE|PRECEDING|FOLLOWING)\b/g,
        '<span class="sql-kw">$1</span>')
      .replace(/'([^']+)'/g, "<span class='sql-str'>'$1'</span>")
      .replace(/--[^\n]*/g, function(m){ return '<span class="sql-cmt">'+m+'</span>'; })
      .replace(/\b(\d+)\b/g, '<span class="sql-num">$1</span>');
  }
  var explanation = p.explanation || null;
  var colored = colorize(p.solution);
  var solGid = hid + '-sol';
  var isOpen = (revealState[hid] && revealState[hid]['sol']) ? true : false;

  var html = '<div class="reveal-gate">' +
    '<div class="reveal-gate-header" onclick="toggleGate(\'' + solGid + '\',\'sol\')">' +
      '<span><span class="reveal-gate-icon">✅</span><span class="reveal-gate-title">Reference Solution</span></span>' +
      '<span style="display:flex;align-items:center;gap:8px">' +
        '<span class="reveal-gate-badge" id="' + solGid + '-badge">' + (isOpen ? 'HIDE' : 'REVEAL') + '</span>' +
        '<span class="reveal-gate-arrow' + (isOpen ? ' open' : '') + '" id="' + solGid + '-arrow">▶</span>' +
      '</span>' +
    '</div>' +
    '<div class="reveal-gate-body' + (isOpen ? ' open' : '') + '" id="' + solGid + '-body">' +
      '<div class="solution-block">' + colored + '</div>';
  // Auto-generate explanation from solution if not defined
  if (!explanation && p.solution) {
    explanation = [];
    var sol = p.solution.trim();
    // Parse clauses from solution
    var clauses = [
      { re: /WITH\s+\w+/i,        clause:'WITH (CTE)',        explain:'Defines a Common Table Expression — a named temporary result set used to simplify the query.' },
      { re: /SELECT\s+DISTINCT/i,  clause:'SELECT DISTINCT',   explain:'Returns unique rows only, removing duplicates from the result.' },
      { re: /SELECT/i,              clause:'SELECT',             explain:'Specifies which columns to return in the result set.' },
      { re: /FROM/i,                clause:'FROM',               explain:'Names the table(s) to query. Joins begin here.' },
      { re: /LEFT\s+JOIN/i,        clause:'LEFT JOIN',          explain:'Keeps all rows from the left table; unmatched right-side columns become NULL.' },
      { re: /INNER\s+JOIN|JOIN/i,  clause:'JOIN',               explain:'Returns only rows where the join condition matches in both tables.' },
      { re: /WHERE/i,               clause:'WHERE',              explain:'Filters rows before grouping. NULL comparisons use IS NULL / IS NOT NULL.' },
      { re: /GROUP\s+BY/i,         clause:'GROUP BY',           explain:'Collapses rows sharing the same values into one group for aggregation.' },
      { re: /HAVING/i,              clause:'HAVING',             explain:'Filters groups after GROUP BY — like WHERE but operates on aggregated values.' },
      { re: /ORDER\s+BY/i,         clause:'ORDER BY',           explain:'Sorts the result. DESC = highest first. NULL values appear last by default.' },
      { re: /LIMIT/i,               clause:'LIMIT',              explain:'Restricts the number of rows returned. Useful for top-N queries.' },
      { re: /OVER\s*\(/i,         clause:'OVER (window)',      explain:'Defines the window for a window function — PARTITION BY groups rows, ORDER BY ranks within them.' },
      { re: /DENSE_RANK/i,          clause:'DENSE_RANK()',        explain:'Assigns rank with no gaps — tied rows share the same rank, next rank is rank+1.' },
      { re: /ROW_NUMBER/i,          clause:'ROW_NUMBER()',        explain:'Assigns a unique sequential number to each row within the window partition.' },
      { re: /LAG\s*\(/i,          clause:'LAG()',              explain:'Gets the value from a previous row — useful for comparing with yesterday/previous period.' },
      { re: /LEAD\s*\(/i,         clause:'LEAD()',             explain:'Gets the value from a following row in the window.' },
      { re: /COUNT\s*\(/i,        clause:'COUNT()',            explain:'COUNT(*) counts all rows; COUNT(col) skips NULLs; COUNT(DISTINCT col) counts unique values.' },
      { re: /SUM\s*\(/i,          clause:'SUM()',              explain:'Totals numeric values in a group, ignoring NULLs.' },
      { re: /CASE\s+WHEN/i,        clause:'CASE WHEN',          explain:'Conditional logic inside SQL — like an if-else. Can be used in SELECT, WHERE, ORDER BY.' },
      { re: /NOT\s+IN|NOT\s+EXISTS/i, clause:'NOT IN / NOT EXISTS', explain:'Filters out rows that appear in a subquery. NOT EXISTS is generally faster with correlated subqueries.' },
      { re: /UNION/i,               clause:'UNION / UNION ALL',  explain:'Combines results of two queries. UNION removes duplicates; UNION ALL keeps them all (faster).' },
    ];
    clauses.forEach(function(c) {
      if (c.re.test(sol) && explanation.length < 5) {
        explanation.push({ clause: c.clause, explain: c.explain });
      }
    });
  }
  if (explanation) {
    html += '<div style="margin-top:16px"><div class="slabel" style="margin-bottom:8px">Step-by-Step Explanation</div>';
    explanation.forEach(function(step, i) {
      html += '<div style="display:flex;gap:10px;margin-bottom:12px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px">' +
        '<div style="flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center">' + (i+1) + '</div>' +
        '<div><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;font-family:var(--mono)">' + step.clause + '</div>' +
        '<div style="font-size:12px;color:var(--text2);line-height:1.7">' + step.explain + '</div></div>' +
      '</div>';
    });
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function getCleanSql() {
  var el = document.getElementById('sql-editor');
  if (!el) return '';
  if (!editorState[current.id]) editorState[current.id] = {};
  editorState[current.id].code = el.value;
  return el.value.trim()
    .replace(/--[^\n]*/g, ' ')
    .replace(/\/\*[\s\S]*?\*\//g, ' ')
    .trim();
}

function execOnDataset(cleanSql, ds) {
  var db;
  try { db = new SQL.Database(); ds.seeds.forEach(function(s){ db.run(s); }); }
  catch(e) { return { passed:false, cols:[], rows:null, errMsg:'Seed error: '+e.message, expected:ds.expected }; }
  var userSql = mysqlToSQLite(cleanSql);
  var stmts = userSql.split(';').filter(function(s){ return s.trim(); });
  var results = null, errMsg = null;
  try {
    stmts.forEach(function(stmt, i) {
      stmt = stmt.trim(); if (!stmt) return;
      if (/^\s*(select|with)/i.test(stmt)) { results = db.exec(stmt); }
      else {
        db.run(stmt);
        if (i === stmts.length-1 && /^\s*(update|delete|insert)/i.test(stmt)) {
          var tm = stmt.match(/(?:UPDATE|DELETE\s+FROM|INSERT\s+INTO)\s+(\w+)/i);
          if (tm) results = db.exec('SELECT * FROM ' + tm[1]);
        }
      }
    });
  } catch(e) { errMsg = e.message; }
  db.close();
  var cols = [], rows = [];
  if (results && results.length) { cols = results[0].columns; rows = results[0].values; }
  var passed = !errMsg && (ds.expected ? (rows.length ? checkAnswer(rows, ds.expected) : (ds.expected[0]&&ds.expected[0][0]===null)) : true);
  return { passed, cols, rows: rows.length ? rows : null, errMsg, expected: ds.expected };
}

// ▶ Run Query — executes against Dataset 1 only, quick feedback
function runQuery() {
  var p = current;
  var cleanSql = getCleanSql();
  var rawSql = document.getElementById('sql-editor') ? document.getElementById('sql-editor').value.trim() : '';
  if (!cleanSql) { setVerdict(null, 'Write a query first'); return; }
  if (!sqliteReady || !SQL) { setVerdict(null, '⏳ Engine loading…'); return; }
  var datasets = getDatasets(p.id);
  if (!datasets) { syntaxCheck(p, cleanSql); return; }
  attempts++;
  var ds0 = datasets[0];
  var result = execOnDataset(cleanSql, ds0);
  if (result.errMsg) {
    setVerdict(false, '✗ SQL Error');
  } else if (result.passed) {
    setVerdict(true, '✓ Dataset 1 passed — click Submit to check all');
  } else {
    setVerdict(false, '✗ Wrong answer on Dataset 1');
  }
  var out = document.getElementById('tc-output');
  if (!out) return;
  var h = '<div style="margin-top:12px">';
  if (result.errMsg) {
    h += '<div class="tc-card fail" style="margin-bottom:10px"><div class="tc-header"><span>✗</span><span>SQL Error</span></div>';
    h += '<div class="tc-body"><div class="tc-data" style="white-space:pre-wrap;color:var(--red)">' + result.errMsg + '</div>';
    h += '<div style="font-size:11px;color:var(--text3);margin-top:6px">💡 Check column/table names · JOIN conditions · quote matching</div></div></div>';
  }
  var rc0 = result.rows ? result.rows.length : 0;
  h += '<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div class="slabel" style="margin:0">Your Output</div><span style="font-size:11px;color:var(--text3)">(' + rc0 + ' rows)</span></div>' + makeTable(result.cols||[], result.rows||[]) + '</div>';
  h += '<div><div class="slabel" style="margin-bottom:6px">Expected Output</div>' + makeExpectedTable(result.expected) + '</div>';
  h += '</div>';
  out.innerHTML = h;
  persistOutput();
}

// ✓ Submit — runs against ALL datasets, logs result
function submitQuery() {
  var p = current;
  var cleanSql = getCleanSql();
  var rawSql = document.getElementById('sql-editor') ? document.getElementById('sql-editor').value.trim() : '';
  if (!cleanSql) { setVerdict(null, 'Write a query first'); return; }
  if (!sqliteReady || !SQL) { setVerdict(null, '⏳ Engine loading — try again in a moment'); return; }
  var datasets = getDatasets(p.id);
  if (!datasets) { syntaxCheck(p, cleanSql); return; }
  attempts++;
  window.__datasets = datasets;
  var dsResults = datasets.map(function(ds){ return execOnDataset(cleanSql, ds); });
  var allPassed = dsResults.every(function(r){ return r.passed; });
  var passCount = dsResults.filter(function(r){ return r.passed; }).length;
  if (allPassed) { solved.add(p.id); streak++; markSolved(p.id); } else { streak = 0; }
  updateStats(); renderList();
  if (allPassed) setVerdict(true, '✓ All ' + datasets.length + ' datasets passed!');
  else {
    var hasErr = dsResults.some(function(r){ return !!r.errMsg; });
    setVerdict(false, hasErr ? '✗ SQL Error — see below' : ('✗ ' + passCount + '/' + datasets.length + ' datasets passed'));
  }
  window.__dsResults = dsResults;
  renderDsView(dsResults, 0);
  persistOutput();
  logSolution(p.id, p.title, rawSql, allPassed, dsResults.map(function(r){ return r.passed; }));

  // Show the celebration / motivation overlay
  showSubmitResult(dsResults, window.__datasets, passCount);
}

      '<div style="font-family:var(--mono);font-size:12px;white-space:pre-wrap;word-break:break-all;color:var(--red)">' + ds.errMsg + '</div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:8px">💡 Check: column/table names match schema · missing JOIN · mismatched quotes</div>' +
    '</div>';
  }

  var rowCount = ds.rows ? ds.rows.length : 0;
  var passIcon = ds.passed ? '✓' : '✗';
  var passColor = ds.passed ? 'var(--green)' : 'var(--red)';

  // Your output (full width)

      '<span style="font-size:12px;font-weight:700;color:' + passColor + ';margin-left:auto">' + passIcon + ' ' + (ds.passed ? 'Correct' : 'Incorrect') + '</span>' +
    '</div>' +

function makeTable(cols, rows) {
  if (!rows || rows.length === 0) {
    return '<div style="padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--text3)">0 rows returned</div>';
  }
  var max = Math.min(rows.length, 100);
  var h = '<div style="overflow-x:auto"><table class="tc-result-table"><thead><tr>';
  for (var i = 0; i < cols.length; i++) h += '<th>' + cols[i] + '</th>';
  h += '</tr></thead><tbody>';
  for (var r = 0; r < max; r++) {
    h += '<tr>';
    for (var c = 0; c < rows[r].length; c++) {
      var v = rows[r][c];
      h += v === null ? '<td><span style="color:var(--text3);font-style:italic">NULL</span></td>' : '<td>' + String(v) + '</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  if (rows.length > 100) h += '<div style="font-size:11px;color:var(--text3);margin-top:4px">Showing first 100 of ' + rows.length + ' rows</div>';
  return h;
}

function makeExpectedTable(expected) {
  if (!expected) return '<div style="padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--text3)">No expected output defined — check the Solution tab.</div>';
  var h = '<div style="overflow-x:auto"><table class="tc-result-table"><tbody>';
  for (var r = 0; r < expected.length; r++) {
    h += '<tr>';
    for (var c = 0; c < expected[r].length; c++) {
      var v = expected[r][c];
      h += '<td>' + (v === null ? '<span style="color:var(--text3);font-style:italic">NULL</span>' : v) + '</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  return h;
}

function setVerdict(pass, msg) {
  var vb = document.getElementById('verdict-box');
  if (!vb) return;
  vb.textContent = msg;
  if (pass === null) {
    vb.className = 'verdict-box';
    vb.setAttribute('style', 'background:var(--blue-bg);color:var(--blue);border:1px solid #b8cfe8;');
  } else if (pass === true) {
    vb.className = 'verdict-box vpass';
    vb.setAttribute('style', '');
  } else {
    vb.className = 'verdict-box vfail';
    vb.setAttribute('style', '');
  }
}

function normaliseVal(v) {
  if (v === null || v === undefined) return '';
  var s = String(v).trim();
  // Numeric normalisation: parse as float and compare so "4" == "4.0" == "4.00"
  var n = parseFloat(s);
  if (!isNaN(n) && isFinite(n) && String(n) !== 'NaN') {
    // Use the numeric value as canonical form (removes trailing zeros)
    return String(n).toLowerCase();
  }
  return s.toLowerCase();
}
function checkAnswer(rows, expected) {
  if (!expected) return true;
  var normRow = function(r) { return r.map(normaliseVal).join('|'); };
  var userSet = rows.map(normRow).sort();
  var expSet  = expected.map(normRow).sort();
  if (userSet.length < expSet.length) return false;
  return expSet.every(function(e){ return userSet.some(function(u){ return u === e; }); });
}

function persistOutput() {
  if (!current) return;
  var vb = document.getElementById('verdict-box');
  var out = document.getElementById('tc-output');
  if (!vb || !out) return;
  if (!editorState[current.id]) editorState[current.id] = {};
  editorState[current.id].lastOutput = {
    verdict: vb.textContent,
    verdictClass: vb.className,
    verdictStyle: vb.getAttribute('style') || '',
    output: out.innerHTML
  };
}

function syntaxCheck(p, sql) {
  var checks = [
    { label: 'Query is not empty', pass: sql.length > 5 },
    { label: 'Contains SELECT', pass: /select/i.test(sql) },
    { label: 'Balanced parentheses', pass: sql.split('(').length === sql.split(')').length }
  ];
  if (p.testFn) checks.push({ label: 'Uses correct SQL pattern', pass: p.testFn(sql), detail: 'Check the Hint tab.' });
  var pass = checks.every(function(c){ return c.pass; });
  if (pass) { solved.add(p.id); streak++; } else { streak = 0; }
  updateStats(); renderList();
  setVerdict(pass, pass ? '✓ Pattern checks passed' : '✗ ' + checks.filter(function(c){ return !c.pass; }).length + ' check(s) failed');
  var out = document.getElementById('tc-output');
  if (!out) return;
  var h = '<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">';
  checks.forEach(function(c) {
    h += '<div class="tc-card ' + (c.pass?'pass':'fail') + '"><div class="tc-header"><span>' + (c.pass?'✓':'✗') + '</span><span>' + c.label + '</span></div>';
    if (!c.pass && c.detail) h += '<div class="tc-body"><div class="tc-data">' + c.detail + '</div></div>';
    h += '</div>';
  });
  h += '</div>';
  out.innerHTML = h;
  persistOutput();
}


function updateStats(){
  const e=solved.size, m=[...solved].filter(id=>QUESTIONS.find(q=>q.id===id&&q.diff==="Easy")).length;
  const med=[...solved].filter(id=>QUESTIONS.find(q=>q.id===id&&q.diff==="Medium")).length;
  const h=[...solved].filter(id=>QUESTIONS.find(q=>q.id===id&&q.diff==="Hard")).length;
  document.getElementById("s-total").textContent=e;
  document.getElementById("s-easy").textContent=m;
  document.getElementById("s-med").textContent=med;
  document.getElementById("s-hard").textContent=h;
  document.getElementById("s-streak").textContent=streak;
  const pct=Math.round(e/QUESTIONS.length*100);
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-label").textContent=pct+"%";

  var spLabel=document.getElementById("sp-label");
  if(spFill) spFill.style.width=pct+"%";
  if(spLabel) spLabel.textContent=e+" / "+QUESTIONS.length+" solved";
}

function launchConfetti(count) {
  var colors = ['#3ddc97','#c4622d','#7c6fff','#ffb86c','#ff79c6','#5cc8ff'];
  for (var i = 0; i < count; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = [
          'left:' + Math.random()*100 + 'vw',
          'top:-20px',
          'background:' + colors[Math.floor(Math.random()*colors.length)],
          'transform:rotate(' + Math.random()*360 + 'deg)',
          'animation-duration:' + (1.5 + Math.random()*2) + 's',
          'animation-delay:' + Math.random()*0.5 + 's',
          'width:' + (6+Math.random()*10) + 'px',
          'height:' + (6+Math.random()*10) + 'px',
          'border-radius:' + (Math.random()>0.5?'50%':'2px'),
        ].join(';');
        document.body.appendChild(el);
        setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 3500);
      }, i * 30);
    })(i);
  }
}

function showSubmitResult(dsResults, datasets, passCount) {
  var total = dsResults.length;
  var allPass = passCount === total;
  var anyPass = passCount > 0;
  var hasErr  = dsResults.some(function(r){ return !!r.errMsg; });

  var msgPool, cardClass;
  if (allPass)      { msgPool = SUCCESS_MSGS; cardClass = 'success'; }
  else if (anyPass) { msgPool = PARTIAL_MSGS; cardClass = 'partial'; }
  else              { msgPool = FAILURE_MSGS; cardClass = 'failure'; }

  var pick = msgPool[Math.floor(Math.random()*msgPool.length)];
  var emoji = pick[0], headline = pick[1], msg = pick[2];

  // Score chips
  var chips = '';
  dsResults.forEach(function(r, i) {
    var lbl = (datasets && datasets[i] && datasets[i].label) || ('DS'+(i+1));
    var cls = r.errMsg ? 'err' : (r.passed ? 'pass' : 'fail');
    var icon = r.errMsg ? '!' : (r.passed ? '✓' : '✗');
    chips += '<div class="ds-score-chip ' + cls + '" style="animation-delay:' + (i*0.06) + 's">' + icon + ' ' + lbl + '</div>';
  });

  var pct = Math.round(passCount / total * 100);
  var fillClass = allPass ? 'success' : anyPass ? 'partial' : 'failure';

  var overlay = document.createElement('div');
  overlay.id = 'submit-overlay';
  overlay.className = 'submit-overlay';
  overlay.innerHTML =
    '<div class="submit-card ' + cardClass + '">' +
      '<span class="submit-emoji">' + emoji + '</span>' +
      '<div class="submit-headline ' + cardClass + (allPass?' shimmer-text':'') + '">' + headline + '</div>' +
      '<div class="submit-msg">' + msg + '</div>' +
      '<div class="ds-scoreboard">' + chips + '</div>' +
      '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">' + passCount + ' / ' + total + ' datasets passed</div>' +
      '<div class="submit-score-bar"><div class="submit-score-fill ' + fillClass + '" id="score-fill" style="width:0%"></div></div>' +
      '<div class="submit-actions">' +
        '<button class="submit-close-btn" onclick="closeSubmitOverlay()">View Results</button>' +
        (allPass ? '<button class="submit-next-btn" onclick="closeSubmitOverlay();nextQuestion()">Next Question →</button>' : '') +
        (!allPass ? '<button class="submit-next-btn" onclick="closeSubmitOverlay()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border2)">Try Again</button>' : '') +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) closeSubmitOverlay(); });

  // Animate score bar after paint
  setTimeout(function(){
    var fill = document.getElementById('score-fill');
    if (fill) fill.style.width = pct + '%';
  }, 100);

  // Launch confetti for success
  if (allPass) launchConfetti(80);
  else if (anyPass) launchConfetti(20);
}

function closeSubmitOverlay() {
  var el = document.getElementById('submit-overlay');
  if (el) el.remove();
  // Remove any leftover confetti
  document.querySelectorAll('.confetti-piece').forEach(function(c){ c.remove(); });
}

function nextQuestion() {
  // Find next unsolved question in the list
  var filtered = document.querySelectorAll('.prob-row');
  var found = false;
  for (var i = 0; i < filtered.length; i++) {
    if (!filtered[i].classList.contains('solved-row')) {
      filtered[i].click();
      found = true;
      break;
    }
  }
  if (!found) {
    // All solved — show a special message
    setTimeout(function(){
      var o = document.createElement('div');
      o.className = 'submit-overlay';
      o.innerHTML = '<div class="submit-card success"><span class="submit-emoji">🏅</span><div class="submit-headline success shimmer-text">Category Complete!</div><div class="submit-msg">You\'ve solved all visible questions. Switch the filter to find more, or try a harder difficulty!</div><div class="submit-actions"><button class="submit-close-btn" onclick="this.closest(\'.submit-overlay\').remove()">Continue</button></div></div>';
      document.body.appendChild(o);
      o.addEventListener('click', function(e){ if(e.target===o) o.remove(); });
      launchConfetti(120);
    }, 300);
  }
}

// ── RESIZABLE SPLIT PANE ──────────────────────────────────────────────────────
(function initSplitResize() {
  var handle, qPane, ePane, startX, startQW, totalW, dragging = false;

  function onMouseMove(e) {
    if (!dragging) return;
    var dx = e.clientX - startX;
    var newQW = Math.max(260, Math.min(startQW + dx, totalW - 260));
    var pct = (newQW / totalW * 100).toFixed(2);
    qPane.style.flex = '0 0 ' + pct + '%';
    e.preventDefault();
  }
  function onMouseUp() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }

  document.addEventListener('DOMContentLoaded', function() {
    handle = document.getElementById('split-handle');
    if (!handle) return;
    handle.addEventListener('mousedown', function(e) {
      qPane  = document.getElementById('q-pane');
      ePane  = document.getElementById('e-pane');
      if (!qPane || !ePane) return;
      var ca = document.getElementById('content-area');
      totalW = ca ? ca.clientWidth : window.innerWidth;
      startX = e.clientX;
      startQW = qPane.getBoundingClientRect().width;
      dragging = true;
      handle.classList.add('dragging');
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
  });
})();

// Restore session from localStorage on refresh
(async function restoreSession() {
  try {
    var saved = localStorage.getItem('sqlarena_session');
    if (saved) {
      var user = JSON.parse(saved);
      // Verify the user still exists in storage
      var users = await getUsers();
      if (user && user.username && users[user.username]) {
        // Session valid — restore without showing auth
        finishAuthComplete(user);
        return;
      } else {
        // User deleted — clear stale session
        localStorage.removeItem('sqlarena_session');
      }
    }
  } catch(e) {}
  // No valid session — show auth
  showAuthOverlay();
})();
