{
  id:84, title:"Consecutive Transactions with Increasing Amounts", diff:"Hard", cat:"LAG/LEAD",
  desc:`Write a query to find all transactions where the amount increased for at least 3 consecutive days. Return transaction_id, customer_id, and number of consecutive days.`,
  schema:[{name:"Transactions", cols:[["transaction_id","int","PK"],["customer_id","int",""],["transaction_date","date",""],["amount","int",""]]}],
  examples:[{
    input:{Transactions:["transaction_id,customer_id,transaction_date,amount","1,101,2023-01-01,100","2,101,2023-01-02,150","3,101,2023-01-03,200","4,101,2023-01-04,180","5,102,2023-01-01,50","6,102,2023-01-02,100","7,102,2023-01-03,150","8,102,2023-01-04,200"]},
    output:"customer_id,consecutive_start,consecutive_days\n101,2023-01-01,3\n102,2023-01-01,4"
  }],
  hint:"Use LAG(amount) OVER (PARTITION BY customer_id ORDER BY transaction_date). Flag where amount > prev. Apply island pattern on flags. HAVING COUNT >= 3.",
  solution:`WITH lagged AS (
  SELECT *, LAG(amount) OVER (PARTITION BY customer_id ORDER BY transaction_date) AS prev_amt
  FROM Transactions
),
flagged AS (
  SELECT *, CASE WHEN amount > prev_amt THEN 0 ELSE 1 END AS new_streak
  FROM lagged
),
groups AS (
  SELECT *, SUM(new_streak) OVER (PARTITION BY customer_id ORDER BY transaction_date) AS grp
  FROM flagged
)
SELECT customer_id, MIN(transaction_date) AS consecutive_start, COUNT(*) AS consecutive_days
FROM groups
GROUP BY customer_id, grp
HAVING COUNT(*) >= 3;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("lag") && s.includes("partition by") && s.includes("having"); }
},
{
  id:85, title:"Rectangles Area", diff:"Hard", cat:"Self JOIN",
  desc:`Write a query to report all possible axis-aligned rectangles with a non-zero area that can be formed by any two points from the Points table. Return in any order. For each pair report (p1, p2, area) where p1 < p2.`,
  schema:[{name:"Points", cols:[["id","int","PK"],["x_value","int",""],["y_value","int",""]]}],
  examples:[{
    input:{Points:["id,x_value,y_value","1,2,7","2,4,8","3,2,10"]},
    output:"p1,p2,area\n2,3,6\n1,2,2\n1,3,6"
  }],
  hint:"Self-join Points p1, p2 where p1.id < p2.id. Area = ABS(p1.x - p2.x) * ABS(p1.y - p2.y). Filter area > 0.",
  solution:`SELECT p1.id AS p1, p2.id AS p2,
  ABS(p1.x_value - p2.x_value) * ABS(p1.y_value - p2.y_value) AS area
FROM Points p1 JOIN Points p2 ON p1.id < p2.id
WHERE p1.x_value != p2.x_value AND p1.y_value != p2.y_value
ORDER BY area DESC, p1, p2;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("abs") && s.includes("x_value") && s.includes("y_value"); }
},

{
  id:87, title:"Hopper Company Queries I", diff:"Hard", cat:"Recursive CTE",
  desc:`Write a query to report the number of drivers and rides for each month of 2020. Drivers who joined before Jan 2020 count from January. Return months 1-12, with 0 if no data.`,
  schema:[
    {name:"Drivers", cols:[["driver_id","int","PK"],["join_date","date",""]]},
    {name:"Rides", cols:[["ride_id","int","PK"],["user_id","int",""],["requested_at","date",""]]},
    {name:"AcceptedRides", cols:[["ride_id","int","PK"],["driver_id","int","FK"],["ride_distance","int",""],["ride_duration","int",""]]}
  ],
  examples:[{
    input:{},
    output:"month,working_drivers,accepted_rides"
  }],
  hint:"Generate months 1-12 with a recursive CTE. Cumulative sum of drivers who joined by each month. LEFT JOIN AcceptedRides per month.",
  solution:`WITH RECURSIVE months AS (
  SELECT 1 AS m UNION ALL SELECT m+1 FROM months WHERE m < 12
),
active_drivers AS (
  SELECT m,
    SUM(CASE WHEN YEAR(join_date)<2020 OR (YEAR(join_date)=2020 AND MONTH(join_date)<=m) THEN 1 ELSE 0 END) AS cnt
  FROM months CROSS JOIN Drivers
  GROUP BY m
),
monthly_rides AS (
  SELECT MONTH(r.requested_at) AS m, COUNT(ar.ride_id) AS rides
  FROM Rides r LEFT JOIN AcceptedRides ar ON r.ride_id = ar.ride_id
  WHERE YEAR(r.requested_at) = 2020
  GROUP BY MONTH(r.requested_at)
)
SELECT months.m AS month, COALESCE(ad.cnt,0) AS working_drivers, COALESCE(mr.rides,0) AS accepted_rides
FROM months
LEFT JOIN active_drivers ad ON months.m = ad.m
LEFT JOIN monthly_rides mr ON months.m = mr.m;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("recursive") && s.includes("month") && s.includes("2020"); }
},

{
  id:90, title:"Suspicious Bank Accounts", diff:"Hard", cat:"Window Function",
  desc:`Write a query to find all accounts that are suspicious. An account is suspicious if the total income exceeds the max_income for two or more consecutive months. Return sorted by account_id.`,
  schema:[
    {name:"Accounts", cols:[["account_id","int","PK"],["max_income","int",""]]},
    {name:"Transactions", cols:[["transaction_id","int","PK"],["account_id","int","FK"],["type","enum('Creditor','Debtor')",""],["amount","int",""],["day","datetime",""]]}
  ],
  examples:[{
    input:{},
    output:"account_id"
  }],
  hint:"Sum monthly income (type=Creditor) per account. Find months where sum > max_income. Use island detection to find consecutive months.",
  solution:`WITH monthly AS (
  SELECT t.account_id, DATE_FORMAT(t.day, '%Y-%m') AS ym,
    SUM(CASE WHEN t.type='Creditor' THEN t.amount ELSE 0 END) AS income
  FROM Transactions t GROUP BY t.account_id, DATE_FORMAT(t.day, '%Y-%m')
),
exceeded AS (
  SELECT m.account_id, m.ym
  FROM monthly m JOIN Accounts a ON m.account_id = a.account_id
  WHERE m.income > a.max_income
),
ranked AS (
  SELECT account_id, ym,
    DATE_SUB(STR_TO_DATE(CONCAT(ym,'-01'),'%Y-%m-%d'), INTERVAL ROW_NUMBER() OVER (PARTITION BY account_id ORDER BY ym) MONTH) AS grp
  FROM exceeded
)
SELECT DISTINCT account_id FROM ranked
GROUP BY account_id, grp HAVING COUNT(*) >= 2
ORDER BY account_id;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("creditor") && s.includes("row_number") && s.includes("having"); }
},

{
  id:93, title:"Monthly Transactions II", diff:"Hard", cat:"Aggregation",
  desc:`Write a query to find for each month and country: the count and sum of approved transactions, and the count and sum of chargebacks (chargeback = declined transaction that was previously approved this month).`,
  schema:[
    {name:"Transactions", cols:[["id","int","PK"],["country","varchar",""],["state","enum('approved','declined')",""],["amount","int",""],["trans_date","date",""]]},
    {name:"Chargebacks", cols:[["trans_id","int","FK"],["trans_date","date",""]]}
  ],
  examples:[{
    input:{},
    output:"month,country,approved_count,approved_amount,chargeback_count,chargeback_amount"
  }],
  hint:"UNION: approved transactions + chargebacks (join to get original transaction amount). Aggregate by month+country.",
  solution:`WITH combined AS (
  SELECT DATE_FORMAT(trans_date,'%Y-%m') AS month, country, 'approved' AS type, amount
  FROM Transactions WHERE state = 'approved'
  UNION ALL
  SELECT DATE_FORMAT(c.trans_date,'%Y-%m'), t.country, 'chargeback', t.amount
  FROM Chargebacks c JOIN Transactions t ON c.trans_id = t.id
)
SELECT month, country,
  SUM(type='approved') AS approved_count,
  SUM(IF(type='approved',amount,0)) AS approved_amount,
  SUM(type='chargeback') AS chargeback_count,
  SUM(IF(type='chargeback',amount,0)) AS chargeback_amount
FROM combined

{
  id:94, title:"First and Last Call on the Same Day", diff:"Hard", cat:"Window Function",
  desc:`Write a query to report the IDs of the users whose first and last calls on any given day were with the same person. Calls are bidirectional.`,
  schema:[{name:"Calls", cols:[["from_id","int",""],["to_id","int",""],["duration","int",""],["call_date","date",""]]}],

{
  id:95, title:"Coordinate with Maximum Network Quality", diff:"Hard", cat:"Math",
  desc:`Write a query to find the network quality at the coordinate with maximum quality. The quality at a point is the sum of floor(power/(1+distance)) for each tower within reach distance. Return the x,y with max quality (smallest x then y if tie).`,
  schema:[{name:"Towers", cols:[["tower_id","int","PK"],["x_pos","int",""],["y_pos","int",""],["quality","int",""],["reach","int",""]]}],
  examples:[{
    input:{Towers:["tower_id,x_pos,y_pos,quality,reach","1,10,20,5,35","2,30,40,7,13","3,5,15,2,31","4,15,25,3,7"]},
    output:"x,y,best"
  }],
  hint:"Join all integer coordinates (0..50) with Towers. Compute Euclidean distance. Sum FLOOR(quality/(1+dist)) where dist<=reach. Find max.",
  solution:`-- This problem requires generating a grid of coordinates.
-- Approach: join a numbers table with towers, compute quality per coordinate.
WITH RECURSIVE nums AS (
  SELECT 0 AS n UNION ALL SELECT n+1 FROM nums WHERE n < 50
),
coords AS (SELECT x.n AS x, y.n AS y FROM nums x CROSS JOIN nums y),
qualities AS (
  SELECT c.x, c.y,
    SUM(FLOOR(t.quality / (1 + SQRT(POW(c.x-t.x_pos,2)+POW(c.y-t.y_pos,2))))) AS q
  FROM coords c
  JOIN Towers t ON SQRT(POW(c.x-t.x_pos,2)+POW(c.y-t.y_pos,2)) <= t.reach
  GROUP BY c.x, c.y
)
SELECT x, y, q AS best FROM qualities ORDER BY q DESC, x, y LIMIT 1;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("sqrt") && s.includes("pow") && s.includes("floor"); }
},

{
  id:97, title:"All Paths Lead to Rome", diff:"Hard", cat:"Recursive CTE",
  desc:`Given a Flights table, write a recursive CTE query to find all paths (sequences of stops) from city 'JFK' to 'LAX'. Return each path as a string like 'JFK→ORD→LAX', along with total cost and number of stops.`,
  schema:[{name:"Flights", cols:[["flight_id","int","PK"],["from_city","varchar",""],["to_city","varchar",""],["cost","int",""]]}],
  examples:[{
    input:{Flights:["flight_id,from_city,to_city,cost","1,JFK,ORD,200","2,JFK,LAX,500","3,ORD,LAX,150","4,ORD,DFW,100","5,DFW,LAX,80"]},
    output:"path,total_cost,stops\nJFK→LAX,500,0\nJFK→ORD→LAX,350,1\nJFK→ORD→DFW→LAX,380,2"
  }],
  hint:"Recursive CTE starting at JFK. Accumulate path string, cost, and depth. Terminate at LAX or a cycle-prevention depth limit.",
  solution:`WITH RECURSIVE paths AS (
  SELECT from_city, to_city, cost, CAST(CONCAT(from_city,'→',to_city) AS CHAR(1000)) AS path, 0 AS stops
  FROM Flights WHERE from_city = 'JFK'
  UNION ALL
  SELECT p.from_city, f.to_city, p.cost + f.cost,
    CONCAT(p.path,'→',f.to_city), p.stops + 1
  FROM paths p JOIN Flights f ON p.to_city = f.from_city
  WHERE p.to_city != 'LAX' AND p.stops < 5
)
SELECT path, cost AS total_cost, stops
FROM paths WHERE to_city = 'LAX'
ORDER BY total_cost;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("recursive") && s.includes("concat") && s.includes("lax"); }
},
{
  id:98, title:"Gaps and Islands — Employee Absence", diff:"Hard", cat:"Island Problem",
  desc:`Find all gaps in employee attendance — periods where an employee was absent for more than 1 consecutive day. Return employee_id, gap_start (first absent day), gap_end (last absent day), and gap_length.`,
  schema:[{name:"Attendance", cols:[["employee_id","int",""],["attendance_date","date",""]]}],
  examples:[{
    input:{Attendance:["employee_id,attendance_date","1,2023-01-02","1,2023-01-03","1,2023-01-05","1,2023-01-06","1,2023-01-10"]},
    output:"employee_id,gap_start,gap_end,gap_length\n1,2023-01-04,2023-01-04,1\n1,2023-01-07,2023-01-09,3"
  }],
  hint:"LEAD(attendance_date) OVER (PARTITION BY employee_id ORDER BY attendance_date). Gap exists when lead_date - current_date > 1. gap_start = current_date+1, gap_end = lead_date-1.",
  solution:`WITH with_lead AS (
  SELECT employee_id, attendance_date,
    LEAD(attendance_date) OVER (PARTITION BY employee_id ORDER BY attendance_date) AS next_date
  FROM Attendance
)
SELECT employee_id,
  DATE_ADD(attendance_date, INTERVAL 1 DAY) AS gap_start,
  DATE_SUB(next_date, INTERVAL 1 DAY) AS gap_end,
  DATEDIFF(next_date, attendance_date) - 1 AS gap_length
FROM with_lead
WHERE DATEDIFF(next_date, attendance_date) > 1;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("lead") && s.includes("datediff") && s.includes("partition by"); }
},
{
  id:99, title:"Find the Subtasks That Did Not Execute", diff:"Hard", cat:"Recursive CTE",
  desc:`Write a query to report the IDs of the subtasks that did not execute. Each task has subtasks numbered 1 to subtasks_count. The Executed table shows which did execute.`,
  schema:[
    {name:"Tasks", cols:[["task_id","int","PK"],["subtasks_count","int",""]]},
    {name:"Executed", cols:[["task_id","int","PK"],["subtask_id","int","PK"]]}
  ],
  examples:[{
    input:{Tasks:["task_id,subtasks_count","1,3","2,2","3,4"],Executed:["task_id,subtask_id","1,2","3,1","3,2","3,3","3,4"]},
    output:"task_id,subtask_id\n1,1\n1,3\n2,1\n2,2"
  }],
  hint:"Use a recursive CTE to generate all (task_id, subtask_id) combos from 1 to subtasks_count. Then LEFT JOIN to Executed and filter IS NULL.",
  solution:`WITH RECURSIVE all_subs AS (
  SELECT task_id, subtasks_count AS sub_id FROM Tasks
  UNION ALL
  SELECT task_id, sub_id - 1 FROM all_subs WHERE sub_id > 1
)
SELECT a.task_id, a.sub_id AS subtask_id
FROM all_subs a
LEFT JOIN Executed e ON a.task_id = e.task_id AND a.sub_id = e.subtask_id
WHERE e.subtask_id IS NULL
ORDER BY a.task_id, a.sub_id;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("recursive") && s.includes("left join") && s.includes("null"); }
},
{
  id:100, title:"Number of Transactions per Visit", diff:"Hard", cat:"Recursive CTE",
  desc:`Write a query to find how many users visited the bank and made 0, 1, 2, ... transactions. Return a table with two columns: transactions_count and visits_count. Include all transaction counts up to the maximum seen.`,
  schema:[
    {name:"Visits", cols:[["user_id","int",""],["visit_date","date",""]]},
    {name:"Transactions", cols:[["user_id","int",""],["transaction_date","date",""],["amount","int",""]]}
  ],
  examples:[{
    input:{Visits:["user_id,visit_date","1,2020-01-01","2,2020-01-02","12,2020-01-01","19,2020-01-03","1,2020-01-02","2,2020-01-03","1,2020-01-04","7,2020-01-11","9,2020-01-25"],Transactions:["user_id,transaction_date,amount","1,2020-01-01,21","2,2020-01-02,33","12,2020-01-01,121","1,2020-01-02,12","1,2020-01-02,11"]},
    output:"transactions_count,visits_count\n0,4\n1,5\n2,0\n3,1"
  }],
  hint:"COUNT transactions per (user,visit_date). Use recursive CTE for 0..MAX. LEFT JOIN to count visits at each level.",
  solution:`WITH visit_tx AS (
  SELECT v.user_id, v.visit_date, COUNT(t.amount) AS tx_count
  FROM Visits v
  LEFT JOIN Transactions t ON v.user_id = t.user_id AND v.visit_date = t.transaction_date
  GROUP BY v.user_id, v.visit_date
),
RECURSIVE counts AS (
  SELECT 0 AS n
  UNION ALL SELECT n+1 FROM counts WHERE n < (SELECT MAX(tx_count) FROM visit_tx)
)
SELECT c.n AS transactions_count, COUNT(vt.tx_count) AS visits_count
FROM counts c
LEFT JOIN visit_tx vt ON c.n = vt.tx_count
GROUP BY c.n
ORDER BY c.n;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("recursive") && s.includes("left join") && s.includes("count"); }
},
{
  id:101, title:"Longest Winning Streak", diff:"Hard", cat:"Island Problem",
  desc:`Write a query to find the longest winning streak for each player. A streak is consecutive 'Win' results. Return player_id and longest_streak, ordered by player_id.`,
  schema:[{name:"Matches", cols:[["player_id","int",""],["match_day","date",""],["result","enum('Win','Draw','Loss')",""]]}],
  examples:[{
    input:{Matches:["player_id,match_day,result","1,2022-01-17,Win","1,2022-01-18,Win","1,2022-01-25,Win","1,2022-01-31,Draw","1,2022-02-07,Win","2,2022-01-25,Win","2,2022-01-27,Win","2,2022-02-01,Draw","2,2022-02-08,Win"]},
    output:"player_id,longest_streak\n1,3\n2,2"
  }],
  hint:"Island problem: ROW_NUMBER() - ROW_NUMBER() OVER wins-only gives group id. COUNT per group. MAX per player.",
  solution:`WITH wins AS (
  SELECT player_id, match_day,
    ROW_NUMBER() OVER (PARTITION BY player_id ORDER BY match_day) AS rn_all,
    ROW_NUMBER() OVER (PARTITION BY player_id ORDER BY match_day) AS rn_wins
  FROM Matches WHERE result = 'Win'
),
islands AS (
  SELECT player_id, rn_all - rn_wins AS grp, COUNT(*) AS streak
  FROM wins GROUP BY player_id, grp
)
SELECT player_id, MAX(streak) AS longest_streak
FROM (
  SELECT DISTINCT player_id FROM Matches
) all_players
LEFT JOIN islands USING (player_id)
GROUP BY player_id
ORDER BY player_id;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("row_number") && s.includes("partition by") && s.includes("max"); }
},
{
  id:102, title:"Average Time of Process per Machine", diff:"Hard", cat:"Self JOIN",
  desc:`There is a factory website with several machines. Each machine runs the same number of processes. Write a query to find the average time each machine takes to complete a process. Return rounded to 3 decimal places.`,
  schema:[{name:"Activity", cols:[["machine_id","int","PK"],["process_id","int","PK"],["activity_type","enum('start','end')","PK"],["timestamp","float",""]]}],
  examples:[{

{
  id:103, title:"Last Survivor", diff:"Hard", cat:"Simulation",
  desc:`In a zombie apocalypse, each zombie can infect adjacent humans. Given a grid, write a query to find the last human position (highest row, then highest col) to be infected if zombies spread one step per tick. Return the turn number and position.`,
  schema:[{name:"Grid", cols:[["x","int","PK"],["y","int","PK"],["val","char(1)",""]]}],
  examples:[{
    input:{Grid:["x,y,val","0,0,Z","0,1,H","0,2,H","1,0,H","1,1,H","1,2,H"]},
    output:"x,y,turn\n1,2,3"
  }],
  hint:"BFS simulation via recursive CTE. Start from zombie positions. Each step infects all adjacent uninfected humans. Track distance (turn) per cell.",
  solution:`WITH RECURSIVE bfs AS (
  SELECT x, y, 0 AS turn FROM Grid WHERE val = 'Z'
  UNION ALL
  SELECT g.x, g.y, b.turn + 1
  FROM bfs b
  JOIN Grid g ON (ABS(g.x-b.x)+ABS(g.y-b.y)=1) AND g.val='H'
  WHERE NOT EXISTS (SELECT 1 FROM bfs b2 WHERE b2.x=g.x AND b2.y=g.y)
)
SELECT x, y, MAX(turn) AS turn FROM bfs GROUP BY x, y
ORDER BY turn DESC, x DESC, y DESC LIMIT 1;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("recursive") && s.includes("abs") && s.includes("union"); }
},
{
  id:104, title:"Number of Paths with Max Score", diff:"Hard", cat:"DP",
  desc:`Given an n×n grid where 'S' is start (top-left), 'E' is end (bottom-right), 'X' is obstacle, and digits are scores, write a query to find the max score path from E to S (moving only up, left, up-left) and the number of such paths. Return as (max_score, num_paths).`,
  schema:[{name:"Grid", cols:[["id","int","PK"],["board","varchar",""]]}],
  examples:[{
    input:{Grid:["id,board","1,E23","2,2X2","3,12S"]},
    output:"result\n7 1"
  }],
  hint:"This requires a DP approach over the grid. Recursively compute (max_score, path_count) from E toward S using recursive CTE or procedural SQL.",
  solution:`-- This requires iterative DP. Using a procedural approach or recursive CTE:
WITH RECURSIVE dp AS (
  -- Base case at E position
  SELECT 0 AS r, 0 AS c, 0 AS score, 1 AS paths
  UNION ALL
  -- Expand to adjacent cells (right, down, diagonal) from E's perspective reversed
  SELECT d.r + dr, d.c + dc,
    d.score + CASE WHEN cell='X' OR cell='S' OR cell='E' THEN 0 ELSE CAST(cell AS UNSIGNED) END,
    d.paths
  FROM dp d
  CROSS JOIN (SELECT 0 dr,1 dc UNION SELECT 1,0 UNION SELECT 1,1) dirs
  JOIN Grid g ON g.id = d.r+dr+1
  WHERE SUBSTRING(g.board, d.c+dc+1, 1) NOT IN ('X')
    AND d.r+dr < (SELECT COUNT(*) FROM Grid)
    AND d.paths > 0
)
SELECT CONCAT(MAX(score),' ',SUM(paths)) AS result FROM dp
WHERE r = (SELECT COUNT(*)-1 FROM Grid) AND c = (SELECT LENGTH(board)-1 FROM Grid LIMIT 1);`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("recursive") && s.includes("union"); }
},
{
  id:105, title:"Minimum Interval to Include Each Query", diff:"Hard", cat:"Window Function",
  desc:`You have intervals [left, right] and queries. For each query value q, find the size (right-left+1) of the smallest interval that contains q. If no interval contains q, return -1.`,
  schema:[
    {name:"Intervals", cols:[["interval_id","int","PK"],["left_val","int",""],["right_val","int",""],["size","int",""]]},
    {name:"Queries", cols:[["query_id","int","PK"],["q_val","int",""]]}
  ],
  examples:[{
    input:{Intervals:["interval_id,left_val,right_val","1,1,4","2,2,4","3,3,6","4,4,4"],Queries:["query_id,q_val","1,2","2,3","3,4","4,5"]},
    output:"query_id,min_size\n1,3\n2,3\n3,1\n4,4"
  }],
  hint:"JOIN Queries to Intervals WHERE q_val BETWEEN left_val AND right_val. Compute size = right_val-left_val+1. MIN(size) per query. COALESCE(-1) for no match.",
  solution:`SELECT q.query_id, COALESCE(MIN(i.right_val - i.left_val + 1), -1) AS min_size
FROM Queries q
LEFT JOIN Intervals i ON q.q_val BETWEEN i.left_val AND i.right_val
GROUP BY q.query_id
ORDER BY q.query_id;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("between") && s.includes("min") && s.includes("coalesce"); }
},
{
  id:106, title:"The Most Frequently Ordered Products for Each Customer", diff:"Hard", cat:"Window Function",
  desc:`Write a query to find the most frequently ordered product(s) for each customer. Return customer_id, product_id, and product_name. If tie, return all tied products.`,
  schema:[
    {name:"Customers", cols:[["customer_id","int","PK"],["name","varchar",""]]},
    {name:"Orders", cols:[["order_id","int","PK"],["order_date","date",""],["customer_id","int","FK"],["product_id","int","FK"]]},

  }],

  SELECT customer_id, product_id, COUNT(*) AS cnt
  FROM Orders GROUP BY customer_id, product_id
),
ranked AS (

SELECT r.customer_id, r.product_id, p.product_name

{
  id:107, title:"Strong Friendship", diff:"Hard", cat:"Graph",
  desc:`A friendship is strong if user1_id and user2_id have at least 3 common friends. Write a query to find all the strong friendships, where user1_id < user2_id. Return sorted by user1_id then user2_id.`,
  schema:[{name:"Friendship", cols:[["user1_id","int","PK"],["user2_id","int","PK"]]}],
  examples:[{
    input:{Friendship:["user1_id,user2_id","1,2","1,3","2,4","1,5","2,5","3,5","1,4","2,3","3,4"]},
    output:"user1_id,user2_id,common_friend_count\n1,2,2\n1,3,1\n..."
  }],
  hint:"Normalize friendships (both directions). For each friend pair (a,b), find friends of a intersected with friends of b. COUNT >= 3.",
  solution:`WITH all_friends AS (
  SELECT user1_id AS u, user2_id AS f FROM Friendship
  UNION ALL
  SELECT user2_id, user1_id FROM Friendship
)
SELECT a.u AS user1_id, b.u AS user2_id, COUNT(*) AS common_friend_count
FROM all_friends a
JOIN all_friends b ON a.f = b.f AND a.u < b.u
WHERE EXISTS (SELECT 1 FROM Friendship f WHERE (f.user1_id=a.u AND f.user2_id=b.u) OR (f.user1_id=b.u AND f.user2_id=a.u))
GROUP BY a.u, b.u
HAVING COUNT(*) >= 3
ORDER BY user1_id, user2_id;`,

// ── STATE ──────────────────────────────────────────────────────────────────────
let current = null;
let activeTab = "problem";
let activeDiff = "all";
let activeCat = "all";
let searchQ = "";
const solved = new Set();
let attempts = 0, streak = 0;

// Persisted per-question editor state: { [id]: { code, lastOutput } }
const editorState = {};

// ── CATEGORY LIST ─────────────────────────────────────────────────────────────
const cats = ["all",...[...new Set(QUESTIONS.map(q=>q.cat))].sort()];
const catFilters = document.getElementById("cat-filters");
cats.forEach(c => {
  const b = document.createElement("button");
  b.className = "cat-chip" + (c==="all"?" active":"");
  b.dataset.c = c;
  // Short labels for the strip
  var label = c === "all" ? "All Topics" : c;
  b.textContent = label;
  b.onclick = () => {
    activeCat = c;
    document.querySelectorAll(".cat-chip").forEach(x=>x.classList.toggle("active",x.dataset.c===c));
    renderList();
  };
  catFilters.appendChild(b);
});

// ── FILTER ─────────────────────────────────────────────────────────────────────
function filterList(){
  searchQ = document.getElementById("search-box").value.toLowerCase();
  renderList();
}

document.getElementById("diff-filters").addEventListener("click", e => {
  const b = e.target.closest(".fchip");
  if(!b) return;
  activeDiff = b.dataset.d;
  document.querySelectorAll(".fchip").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  renderList();
});

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList(){
  var list = document.getElementById("prob-list");
  var filtered = QUESTIONS.filter(function(q) {
    if(activeDiff === "Easy"   && q.diff !== "Easy")   return false;
    if(activeDiff === "Medium" && q.diff !== "Medium") return false;
    if(activeDiff === "Hard"   && q.diff !== "Hard")   return false;
    if(activeDiff === "solved"   && !solved.has(q.id)) return false;
    if(activeDiff === "unsolved" &&  solved.has(q.id)) return false;
    if(activeCat !== "all" && q.cat !== activeCat) return false;
    if(searchQ && !q.title.toLowerCase().includes(searchQ) && !q.cat.toLowerCase().includes(searchQ)) return false;
    return true;
  });

  // Sidebar progress bar
  var pct = Math.round(solved.size / QUESTIONS.length * 100);
  var spFill = document.getElementById("sp-fill");
  var spLabel = document.getElementById("sp-label");
  if(spFill)  spFill.style.width  = pct + "%";
  if(spLabel) spLabel.textContent = solved.size + " / " + QUESTIONS.length + " solved";

  // Question count label
  var qLabel = document.getElementById("q-count-label");
  if(qLabel) qLabel.textContent = filtered.length === QUESTIONS.length
    ? "All " + QUESTIONS.length + " questions"
    : filtered.length + " of " + QUESTIONS.length + " questions";

  var diffClass = { "Easy":"easy", "Medium":"med", "Hard":"hard" };

  list.innerHTML = filtered.map(function(q, idx) {
    var dc       = diffClass[q.diff] || "easy";
    var isSolved = solved.has(q.id);
    var isActive = current && current.id === q.id;
    var delay    = Math.min(idx * 0.02, 0.3).toFixed(2);
    var badge    = '<div class="diff-badge-num ' + dc + '">' + q.id + '</div>';
    var meta     = '<div class="prob-row-num">' + q.cat + ' &middot; ' + q.diff + '</div>';
    var title    = '<div class="prob-row-title">' + q.title + '</div>';
    var check    = isSolved
      ? '<div class="solved-check">&#10003;</div>'
      : '<div class="unsolved-stub"></div>';
    return '<div class="prob-row' + (isActive?' active':'') + (isSolved?' solved-row':'') + '"' +
           ' style="animation-delay:' + delay + 's"' +
           ' onclick="selectQ(' + q.id + ')">' +
      badge +
      '<div class="prob-row-left">' + meta + title + '</div>' +
      check +
    '</div>';
  }).join("");
}



// ── SELECT ────────────────────────────────────────────────────────────────────
function saveEditorState(){
  if(!current) return;
  const el = document.getElementById("sql-editor");
  if(el) editorState[current.id] = editorState[current.id] || {};
  if(el) editorState[current.id].code = el.value;
}

function selectQ(id){
  saveEditorState();
  current = QUESTIONS.find(q=>q.id===id);
  activeTab = "code";
  try { localStorage.setItem('sqlarena_lastq', id); } catch(e){}
  renderList();
  renderPanel();
}

  backdrop.classList.remove('open');

function renderPanel() {

function restoreCodeTabState(p){
  var el = document.getElementById('sql-editor');
  if (!el) return;
  var saved = editorState[p.id];
  if (saved && saved.code !== undefined) el.value = saved.code;
  if (saved && saved.lastOutput) {
    var vb  = document.getElementById('verdict-box');
    var out = document.getElementById('tc-output');
    if (vb)  { vb.textContent = saved.lastOutput.verdict; vb.className = saved.lastOutput.verdictClass; if(saved.lastOutput.verdictStyle) vb.setAttribute('style', saved.lastOutput.verdictStyle); }
    if (out) { out.innerHTML  = saved.lastOutput.output; }
    // Re-attach dataset click handlers
    if (window.__dsResults) renderDsView(window.__dsResults, 0);
  }
  // Restore reveal state for hint/solution
  setTimeout(function() { applyRevealState(p); }, 0);
}

function renderProblemTab(p){
  let html = `<div class="slabel">Problem Statement</div><div class="desc">${p.desc}</div>`;
  if(p.schema && p.schema.length){
    html += `<div class="slabel" style="margin-top:4px">Table Schema</div>`;
    p.schema.forEach(t=>{
      html += `<div class="schema-block"><div class="schema-title">Table: ${t.name}</div>
        <table class="schema-table"><thead><tr><th>Column</th><th>Type</th><th></th></tr></thead><tbody>
        ${t.cols.map(c=>`<tr><td>${c[0]}</td><td>${c[1]}</td><td>${c[2]?`<span class="pk">${c[2]}</span>`:""}</td></tr>`).join("")}
        </tbody></table></div>`;
    });
  }
  if(p.examples && p.examples.length){
    html += `<div class="slabel" style="margin-top:16px">Example</div>`;
    p.examples.forEach((e,i)=>{
      html += `<div class="example-block">`;
      if(e.input && typeof e.input === "object" && Object.keys(e.input).length){
        Object.entries(e.input).forEach(([tname,rows])=>{
          if(!rows||!rows.length) return;
          const headers = rows[0].split(",");
          html += `<div class="example-in"><strong style="font-size:11px;color:var(--text2)">${tname}</strong><br><table style="margin:4px 0">
            <thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
            <tbody>${rows.slice(1).map(r=>`<tr>${r.split(",").map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>
          </table></div>`;
        });
      }
      html += `<div class="example-out-label">Output</div><div class="example-in"><pre style="font-size:11px;margin:0">${e.output}</pre></div>`;
      if(e.explain) html += `<div class="example-explain">${e.explain}</div>`;
      html += `</div>`;
    });
  }
  return html;
}

// ── SQLite compat: translate MySQL-isms ──────────────────────────────────────
function mysqlToSQLite(sql){
  return sql
    // DATE functions
    .replace(/\bDATEDIFF\s*\(([^,]+),([^)]+)\)/gi, "(julianday($1)-julianday($2))")
    .replace(/\bDATE_FORMAT\s*\(([^,]+),\s*'%Y-%m'\)/gi, "strftime('%Y-%m',$1)")
    .replace(/\bDATE_FORMAT\s*\(([^,]+),\s*'([^']+)'\)/gi, "strftime('$2',$1)")
    .replace(/\bYEAR\s*\(([^)]+)\)/gi, "CAST(strftime('%Y',$1) AS INTEGER)")
    .replace(/\bMONTH\s*\(([^)]+)\)/gi, "CAST(strftime('%m',$1) AS INTEGER)")
    .replace(/\bDAY\s*\(([^)]+)\)/gi, "CAST(strftime('%d',$1) AS INTEGER)")
    .replace(/\bDATE_ADD\s*\(([^,]+),\s*INTERVAL\s+(\d+)\s+DAY\)/gi, "date($1,'+$2 days')")
    .replace(/\bDATE_ADD\s*\(([^,]+),\s*INTERVAL\s+1\s+DAY\)/gi, "date($1,'+1 day')")
    .replace(/\bDATE_SUB\s*\(([^,]+),\s*INTERVAL\s+(\d+)\s+DAY\)/gi, "date($1,'-$2 days')")
    .replace(/\bDATE_SUB\s*\(([^,]+),\s*INTERVAL\s+(\d+)\s+MONTH\)/gi, "date($1,'-$2 months')")
    .replace(/\bDATE_SUB\s*\(([^,]+),\s*INTERVAL\s+(\d+)\s+YEAR\)/gi, "date($1,'-$2 years')")
    .replace(/\bCURDATE\(\)/gi, "date('now')")
    // String
    .replace(/\bSUBSTRING\s*\(/gi, "SUBSTR(")
    .replace(/\bIF\s*\(([^,]+),([^,]+),([^)]+)\)/gi, "CASE WHEN $1 THEN $2 ELSE $3 END")
    .replace(/\bIFNULL\s*\(/gi, "IFNULL(")
    .replace(/\bCONCAT\s*\(/gi, "($1||")  // rough; handled below
    // GROUP_CONCAT
    .replace(/GROUP_CONCAT\s*\(DISTINCT\s+(\w+)\s+ORDER\s+BY\s+\w+\s+SEPARATOR\s+'([^']+)'\)/gi, "GROUP_CONCAT(DISTINCT $1,'$2')")
    .replace(/GROUP_CONCAT\s*\((\w+)\s+ORDER\s+BY\s+\w+\s+SEPARATOR\s+'([^']+)'\)/gi, "GROUP_CONCAT($1,'$2')")
    // CONCAT with two args
    .replace(/CONCAT\s*\(([^,]+),\s*([^)]+)\)/gi, "($1||$2)")
    // ABS on dates → just pass through
    .replace(/\bLIMIT\s+(\d+)\s+OFFSET\s+(\d+)/gi, "LIMIT $1 OFFSET $2")
    // REGEXP → LIKE fallback not perfect but avoids hard crash
    .replace(/\bREGEXP\b/gi, "LIKE");
}

// AUTH + STORAGE
// ═══════════════════════════════════════════════════════════
var currentUser = null; // { username, isAdmin }

async function storageGet(key) {
  try {
    if (window.storage) { var r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
    var ls = localStorage.getItem('sqlarena_' + key);
    return ls ? JSON.parse(ls) : null;
  } catch(e) { return null; }
}
async function storageSet(key, val) {
  try {
    if (window.storage) { await window.storage.set(key, JSON.stringify(val)); return true; }
    localStorage.setItem('sqlarena_' + key, JSON.stringify(val)); return true;
  } catch(e) { return false; }
}

async function getUsers() {
  return (await storageGet('sql_users')) || {};
}
async function saveUsers(users) {
  return await storageSet('sql_users', users);
}

async function doSignup(username, password) {
  username = username.trim().toLowerCase();
  if (!username || !password) return { ok:false, msg:'Fill in both fields' };
  if (username.length < 3) return { ok:false, msg:'Username must be at least 3 chars' };
  var users = await getUsers();
  if (users[username]) return { ok:false, msg:'Username already taken' };
  users[username] = {
    password: btoa(password), // basic obfuscation (not real security)
    createdAt: new Date().toISOString(),
    isAdmin: Object.keys(users).length === 0 // first user is admin
  };
  await saveUsers(users);
  return { ok:true, user: { username, isAdmin: users[username].isAdmin } };
}

async function doLogin(username, password) {
  username = username.trim().toLowerCase();
  if (!username || !password) return { ok:false, msg:'Fill in both fields' };
  var users = await getUsers();
  var u = users[username];
  if (!u) return { ok:false, msg:'User not found' };
  if (btoa(password) !== u.password) return { ok:false, msg:'Wrong password' };
  return { ok:true, user: { username, isAdmin: u.isAdmin } };
}

// Solution log
async function logSolution(qid, qtitle, sql, passed, dsResults) {
  if (!currentUser) return;
  var key = 'sql_log:' + currentUser.username;
  var log = (await storageGet(key)) || [];
  log.unshift({
    qid, qtitle, sql, passed, dsResults,
    ts: new Date().toISOString()
  });
  if (log.length > 200) log = log.slice(0, 200);
  await storageSet(key, log);
}

async function getLog() {
  if (!currentUser) return [];
  return (await storageGet('sql_log:' + currentUser.username)) || [];
}

// Mark solved per user
async function markSolved(qid) {
  if (!currentUser) return;
  var key = 'sql_solved:' + currentUser.username;
  var s = (await storageGet(key)) || [];
  if (!s.includes(qid)) { s.push(qid); await storageSet(key, s); }
}

async function loadSolved() {
  if (!currentUser) return;
  var key = 'sql_solved:' + currentUser.username;
  var s = (await storageGet(key)) || [];
  solved.clear();
  s.forEach(function(id) { solved.add(id); });
  updateStats();
  renderList();
  return true;
}

function authSwitchTab(t) {
  var isLogin = t === 'login';
  document.getElementById('auth-form-login').style.display  = isLogin ? '' : 'none';
  document.getElementById('auth-form-signup').style.display = isLogin ? 'none' : '';
  document.getElementById('tab-login').classList.toggle('active',  isLogin);
  document.getElementById('tab-signup').classList.toggle('active', !isLogin);
  document.getElementById('auth-title').textContent    = isLogin ? 'Welcome back'     : 'Create account';
  document.getElementById('auth-subtitle').textContent = isLogin
    ? 'Sign in to pick up where you left off.'
    : 'Join free. Track your progress. Get interview-ready.';
  var focus = isLogin ? 'login-user' : 'signup-user';
  setTimeout(function(){ var el=document.getElementById(focus); if(el) el.focus(); }, 50);
}

async function handleLogin() {
  var u   = document.getElementById('login-user').value;
  var p   = document.getElementById('login-pass').value;
  var msg = document.getElementById('login-msg');
  var btn = document.querySelector('#auth-form-login .auth-submit');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  msg.textContent = ''; msg.className = 'auth-msg-new';
  var res = await doLogin(u, p);
  btn.textContent = 'Sign In →'; btn.disabled = false;
  if (res.ok) {
    msg.textContent = '✓ Welcome back, ' + res.user.username + '!';
    msg.className = 'auth-msg-new ok';
    setTimeout(function(){ flashAndFinish(res.user); }, 600);
  } else {
    msg.textContent = '✗ ' + res.msg;
    msg.className = 'auth-msg-new err';
    var input = document.getElementById('login-user');
    if(input){ input.style.borderColor='var(--red)'; setTimeout(function(){ input.style.borderColor=''; }, 1200); }
  }
}

async function handleSignup() {
  var u   = document.getElementById('signup-user').value;
  var p   = document.getElementById('signup-pass').value;
  var msg = document.getElementById('signup-msg');
  var btn = document.querySelector('#auth-form-signup .auth-submit');
  btn.textContent = 'Creating…'; btn.disabled = true;
  msg.textContent = ''; msg.className = 'auth-msg-new';
  var res = await doSignup(u, p);
  btn.textContent = 'Create Account →'; btn.disabled = false;
  if (res.ok) {
    msg.textContent = '✓ Account created! Welcome, ' + res.user.username + '!';
    msg.className = 'auth-msg-new ok';
    setTimeout(function(){ flashAndFinish(res.user); }, 700);
  } else {
    msg.textContent = '✗ ' + res.msg;
    msg.className = 'auth-msg-new err';
  }
}

function continueAsGuest() {
  flashAndFinish(null);
}

function flashAndFinish(user) {
  // Cinematic flash transition
  var flash = document.createElement('div');
  flash.className = 'auth-success-flash';

  var initials = user ? user.username.substring(0,2).toUpperCase() : '?';
  var greeting = user ? ('Welcome, ' + user.username + (user.isAdmin ? ' 👑' : '') + '!') : 'Welcome!';

  flash.innerHTML =
    '<div style="text-align:center">' +
      '<div style="width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);' +
           'border:3px solid rgba(255,255,255,.6);margin:0 auto 16px;display:flex;align-items:center;' +
           'justify-content:center;font-family:var(--serif);font-size:26px;font-weight:600;color:#fff;' +
           'animation:popIn .4s ease">' + initials + '</div>' +
      '<div class="auth-success-text">' + greeting + '</div>' +
      '<div style="font-size:13px;color:rgba(255,255,255,.7);margin-top:8px;font-family:var(--mono)">' +
        (user ? 'Loading your progress…' : 'Entering as guest…') +
      '</div>' +
    '</div>';

  // Remove auth overlay, show flash
  var overlay = document.getElementById('auth-overlay');
  if (overlay) overlay.remove();
  document.body.appendChild(flash);

  // After flash, remove and finish
  setTimeout(function() {
    flash.style.transition = 'opacity .4s';
    flash.style.opacity = '0';
    setTimeout(function() {
      flash.remove();
      finishAuthComplete(user);
    }, 400);
  }, 1000);
}

function finishAuthComplete(user) {
  currentUser = user;
  // Persist session so refresh doesn't log out
  try {
    if (user) localStorage.setItem('sqlarena_session', JSON.stringify(user));
    else localStorage.removeItem('sqlarena_session');
  } catch(e) {}
  renderUserBar();
  if (user) {
    loadSolved().then(function() {
      // Profile page takes priority — check it first
      try {
        var lastPage = localStorage.getItem('sqlarena_lastpage');
        if (lastPage === 'profile') { showProfilePage(); return; }
      } catch(e){}
      // Restore last question
      try {
        var lastQ = localStorage.getItem('sqlarena_lastq');
        if (lastQ) {
          var qid = parseInt(lastQ, 10);
          var q = QUESTIONS.find(function(q){ return q.id === qid; });
          if (q) { current = q; activeTab = 'code'; renderList(); renderPanel(); return; }
        }
      } catch(e){}
      var d = document.getElementById('q-drawer');
      if (d && !d.classList.contains('open')) toggleDrawer();
    });
  } else {
    setTimeout(function() {
      var d = document.getElementById('q-drawer');
      if (d && !d.classList.contains('open')) toggleDrawer();
    }, 300);
  }
}

// ═══════════════════════════════════════════════════════════════
// PROFILE PAGE
// ═══════════════════════════════════════════════════════════════
async function showProfilePage() {
  var existing = document.getElementById('profile-overlay');
  if (existing) { existing.remove(); try { localStorage.removeItem('sqlarena_lastpage'); } catch(e){} return; }
  // Save that profile is open so refresh restores it
  try { localStorage.setItem('sqlarena_lastpage', 'profile'); } catch(e) {}

  var log = await getLog();
  var profile = await getUserProfile();
  var avatarURL = await getAvatarDataURL();

  // ── Compute analytics ────────────────────────────────────────
  var solvedIds    = [...solved];
  var easyS   = solvedIds.filter(function(id){ var q=QUESTIONS.find(function(q){return q.id===id;}); return q&&q.diff==='Easy'; }).length;
  var medS    = solvedIds.filter(function(id){ var q=QUESTIONS.find(function(q){return q.id===id;}); return q&&q.diff==='Medium'; }).length;
  var hardS   = solvedIds.filter(function(id){ var q=QUESTIONS.find(function(q){return q.id===id;}); return q&&q.diff==='Hard'; }).length;
  var easyT   = QUESTIONS.filter(function(q){return q.diff==='Easy';}).length;
  var medT    = QUESTIONS.filter(function(q){return q.diff==='Medium';}).length;
  var hardT   = QUESTIONS.filter(function(q){return q.diff==='Hard';}).length;

  // Topic breakdown
  var topicMap = {};
  solvedIds.forEach(function(id) {
    var q = QUESTIONS.find(function(q){return q.id===id;});
    if (q) { topicMap[q.cat] = (topicMap[q.cat]||0)+1; }
  });
  var topicEntries = Object.entries(topicMap).sort(function(a,b){return b[1]-a[1];});
  var maxTopic = topicEntries.length ? topicEntries[0][1] : 1;

  // Category icons
  var catIcons = {
    'JOIN':'🔗','GROUP BY':'📊','Window Function':'🪟','Subquery':'🔍',
    'LEFT JOIN':'⬅️','Self JOIN':'🔄','Aggregation':'∑','CASE':'🔀',
    'Pivot':'↔️','Island Problem':'🏝️','Recursive CTE':'♻️','LAG/LEAD':'↕️',
    'UNION':'🔀','DML':'✏️','String Functions':'📝','WHERE':'🎯',
    'Set Operations':'🔁','DP':'⚡','Graph':'🕸️','Math':'📐',
    'Simulation':'🎮','Sorting / Intervals':'📅','REGEXP':'🔤',
    'NOT EXISTS':'🚫','CROSS JOIN':'✖️'
  };

  // Streak & heatmap — track UNIQUE QUESTIONS SOLVED per day
  var dayMap = {};     // { date: count of unique questions solved }
  var dayQMap = {};    // { date: [ {qid, qtitle, diff} ] }
  // First pass: collect all passed submissions grouped by day
  log.forEach(function(e) {
    if (!e.passed) return;  // only count solved questions
    var d = e.ts ? e.ts.slice(0,10) : '';
    if (!d) return;
    if (!dayQMap[d]) dayQMap[d] = [];
    // Only add unique qid per day
    var alreadyHave = dayQMap[d].some(function(q){ return q.qid === e.qid; });
    if (!alreadyHave) {
      var q = QUESTIONS.find(function(q){ return q.id === e.qid; });
      dayQMap[d].push({ qid: e.qid, qtitle: e.qtitle, diff: q ? q.diff : '' });
    }
  });
  // Build dayMap from unique counts
  Object.keys(dayQMap).forEach(function(d) { dayMap[d] = dayQMap[d].length; });
  // Compute current streak
  var today = new Date();
  var streak = 0;
  for (var i = 0; i < 365; i++) {
    var d = new Date(today); d.setDate(d.getDate()-i);
    var key = d.toISOString().slice(0,10);
    if (dayMap[key]) streak++;
    else if (i > 0) break;
  }
  // Max streak
  var allDays = Object.keys(dayMap).sort();
  var maxStr = 0, curStr = 0, prevD = null;
  allDays.forEach(function(d) {
    if (!prevD) { curStr=1; }
    else {
      var diff = (new Date(d)-new Date(prevD))/(86400000);
      curStr = diff===1 ? curStr+1 : 1;
    }
    maxStr = Math.max(maxStr, curStr);
    prevD = d;
  });

  // Build 52-week heatmap
  var heatStart = new Date(today);
  heatStart.setDate(heatStart.getDate() - 363);
  heatStart.setDate(heatStart.getDate() - heatStart.getDay()); // align Sunday
  var weeks = [];
  for (var w = 0; w < 53; w++) {
    var col = [];
    for (var d2 = 0; d2 < 7; d2++) {
      var dt = new Date(heatStart);
      dt.setDate(dt.getDate() + w*7 + d2);
      var dstr = dt.toISOString().slice(0,10);
      var cnt = dayMap[dstr] || 0;
      var level = cnt === 0 ? 0 : cnt === 1 ? 1 : cnt <= 3 ? 2 : cnt <= 5 ? 3 : 4;
      col.push({d:dstr, cnt:cnt, level:level});
    }
    weeks.push(col);
  }

  // Month labels
  var monthLabels = [], lastMonth = -1;
  weeks.forEach(function(col) {
    var m = new Date(col[0].d).getMonth();
    var label = m !== lastMonth ? ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m] : '';
    monthLabels.push(label);
    lastMonth = m !== lastMonth ? m : lastMonth;
  });

  // Recent 8 submissions
  var recent = log.slice(0,8);

  // Acceptance rate
  var passedLogs = log.filter(function(e){return e.passed;}).length;
  var acc = log.length ? Math.round(passedLogs/log.length*100) : 0;

  // ── Build HTML ────────────────────────────────────────────────
  var initials = currentUser.username.substring(0,2).toUpperCase();
  var avatarInner = avatarURL
    ? '<img src="' + avatarURL + '" style="width:100%;height:100%;object-fit:cover">'
    : '<span>' + initials + '</span>';

  // Donut SVG
  var total3 = easyS + medS + hardS || 1;
  var r = 62, cx = 80, cy = 80, strokeW = 14;
  var circumference = 2 * Math.PI * r;
  var easyPct = easyS/total3, medPct = medS/total3, hardPct = hardS/total3;
  var e_len = circumference * easyPct, m_len = circumference * medPct, h_len = circumference * hardPct;
  var e_off = 0, m_off = -(e_len), h_off = -(e_len+m_len);
  var donutSVG = '<svg width="160" height="160" viewBox="0 0 160 160" class="donut-svg">' +
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--surface3)" stroke-width="'+strokeW+'"/>' +
    (easyS > 0 ? '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--easy-c)" stroke-width="'+strokeW+'" stroke-dasharray="'+e_len+' '+circumference+'" stroke-dashoffset="'+e_off+'" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray 1s ease"/>' : '') +
    (medS > 0  ? '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--med-c)"  stroke-width="'+strokeW+'" stroke-dasharray="'+m_len+' '+circumference+'" stroke-dashoffset="'+m_off+'" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray 1s ease"/>' : '') +
    (hardS > 0 ? '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--hard-c)" stroke-width="'+strokeW+'" stroke-dasharray="'+h_len+' '+circumference+'" stroke-dashoffset="'+h_off+'" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray 1s ease"/>' : '') +
    '<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" font-size="26" font-weight="700" fill="var(--text)" font-family="Inter,sans-serif">' + solvedIds.length + '</text>' +
    '<text x="'+cx+'" y="'+(cy+14)+'" text-anchor="middle" font-size="11" fill="var(--text3)" font-family="Inter,sans-serif">solved</text>' +
    '</svg>';

  // Streak dots — last 14 days
  var streakDots = '';
  for (var sd = 13; sd >= 0; sd--) {
    var sdt = new Date(today); sdt.setDate(sdt.getDate()-sd);
    var skey = sdt.toISOString().slice(0,10);
    var dayName = ['S','M','T','W','T','F','S'][sdt.getDay()];
    var cls = sd===0 ? (dayMap[skey]?'active today':'today') : (dayMap[skey]?'active':'');
    streakDots += '<div class="streak-dot ' + cls + '" title="' + skey + '">' + dayName + '</div>';
  }

  // Heatmap HTML
  var monthRow = '<div class="heatmap-month-labels">';
  monthLabels.forEach(function(m){ monthRow += '<div class="hm-month">' + (m||'') + '</div>'; });
  monthRow += '</div>';
  var heatHTML = monthRow + '<div class="heatmap-grid">';

// Avatar upload handler
function handleAvatarUpload(e) {
  var file = e.target.files[0];
  if (!file || !currentUser) return;
  var reader = new FileReader();
  reader.onload = async function(ev) {
    var dataURL = ev.target.result;
    await saveAvatarURL(dataURL);
    // Update profile avatar
    var el = document.getElementById('profile-avatar-el');
    if (el) el.innerHTML = '<img src="' + dataURL + '" style="width:100%;height:100%;object-fit:cover">';
    // Update topbar avatar
    renderUserBar();
    showToast('Profile photo updated!');
  };
  reader.readAsDataURL(file);
}

// Debounced profile save
var _profileSaveTimer = null;
function debounceSaveProfile() {
  clearTimeout(_profileSaveTimer);
  _profileSaveTimer = setTimeout(async function() {
    var company = document.getElementById('profile-company');
    var loc     = document.getElementById('profile-location');
    var cur = await getUserProfile();
    if (company) cur.company  = company.value;
    if (loc)     cur.location = loc.value;
    await saveUserProfile(cur);
    showToast('Saved ✓');
  }, 800);
}

async function saveBioFromEditor() {
  var ta = document.getElementById('bio-textarea');
  if (!ta) return;
  var bio = ta.value.trim().slice(0, 2000);
  var prof = await getUserProfile();
  prof.bio = bio;
  await saveUserProfile(prof);
  document.getElementById('bio-editor-modal').remove();
  // Update display in place without full reload
  var display = document.getElementById('profile-bio-display');
  if (bio && display) {
    display.textContent = bio;
  } else {
    // Need to re-render the section
    var ov = document.getElementById('profile-overlay');
    if (ov) { ov.remove(); showProfilePage(); }
  }
  showToast('Bio saved');
}

async function runUserSearch() {
  var inp = document.getElementById('user-search-input');
  var res = document.getElementById('user-search-results');
  if (!inp || !res) return;
  var q = inp.value.trim().toLowerCase();
  if (!q) {
    res.innerHTML = '<div style="padding:28px;text-align:center;color:var(--text3);font-size:13px">Type a username to search...</div>';
    return;
  }
  var users = await getUsers();
  var matches = Object.keys(users).filter(function(u) { return u.toLowerCase().includes(q); }).slice(0, 15);
  if (!matches.length) {
    res.innerHTML = '<div style="padding:28px;text-align:center;color:var(--text3);font-size:13px">No users found for "' + q + '"</div>';
    return;
  }
  var parts = [];
  for (var i = 0; i < matches.length; i++) {
    var uname = matches[i];
    var udata = users[uname];
    var uprof = (await storageGet('profile_' + uname)) || {};
    // fallback localStorage
    if (!uprof.bio) {
      try {
        var ls = localStorage.getItem('sqlarena_profile_' + uname);
        if (ls) uprof = JSON.parse(ls);
      } catch(e) {}
    }
    var uavatar = await storageGet('avatar_' + uname);
    if (!uavatar) { try { uavatar = localStorage.getItem('sqlarena_avatar_' + uname); } catch(e) {} }
    var usolvedArr = (await storageGet('sql_solved:' + uname)) || [];
    var ini = uname.substring(0,2).toUpperCase();
    var avH = uavatar
      ? '<img src="' + uavatar + '" style="width:100%;height:100%;object-fit:cover;border-radius:10px">'
      : '<span style="font-weight:700;color:#fff;font-size:14px">' + ini + '</span>';
    var ghLink = uprof.github
      ? '<a href="' + (uprof.github.startsWith('http') ? uprof.github : 'https://' + uprof.github) + '" target="_blank" rel="noopener" style="color:var(--accent);font-size:10px;font-family:var(--mono);text-decoration:none" onclick="event.stopPropagation()">' + uprof.github + '</a>'
      : '';
    parts.push(
      '<div class="user-card-result" data-uname="' + uname + '" style="display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer" onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'\'">' +
        '<div style="width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">' + avH + '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-size:13px;font-weight:600;color:var(--text)">' + (uprof.displayName || uname) + (udata.isAdmin ? ' &#x1F451;' : '') + '</div>' +
          '<div style="font-size:11px;color:var(--text3);font-family:var(--mono)">@' + uname + ' &middot; ' + usolvedArr.length + ' solved' + (ghLink ? ' &middot; ' + ghLink : '') + '</div>' +
          (uprof.bio ? '<div style="font-size:12px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + uprof.bio.replace(/</g,'&lt;').slice(0, 100) + (uprof.bio.length > 100 ? '...' : '') + '</div>' : '') +
          ((uprof.company || uprof.location)
            ? '<div style="font-size:10px;color:var(--text3);margin-top:2px">' + [uprof.company, uprof.location].filter(Boolean).join(' · ') + '</div>'
            : '') +
        '</div>' +
        '<div style="font-size:18px;color:var(--text3)">&#x203A;</div>' +
      '</div>'
    );
  }
  res.innerHTML = parts.join('');
}

async function showOtherUserProfile(uname) {
  // Close search modal
  var sm = document.getElementById('user-search-modal');
  if (sm) sm.remove();

  var users = await getUsers();
  var udata = users[uname];
  if (!udata) { showToast('User not found'); return; }

  var uprof   = (await storageGet('profile_' + uname)) || {};
  var uavatar = await storageGet('avatar_' + uname);
  var usolvedArr = (await storageGet('sql_solved:' + uname)) || [];
  var ulog    = (await storageGet('sql_log:' + uname)) || [];

  // Stats
  var solvedIds = usolvedArr;
  var easyS  = solvedIds.filter(function(id){ var q=QUESTIONS.find(function(q){return q.id===id;}); return q&&q.diff==='Easy'; }).length;
  var medS   = solvedIds.filter(function(id){ var q=QUESTIONS.find(function(q){return q.id===id;}); return q&&q.diff==='Medium'; }).length;
  var hardS  = solvedIds.filter(function(id){ var q=QUESTIONS.find(function(q){return q.id===id;}); return q&&q.diff==='Hard'; }).length;
  var passedLogs = ulog.filter(function(e){ return e.passed; }).length;
  var acc = ulog.length ? Math.round(passedLogs / ulog.length * 100) : 0;

  // Streak
  var dayMap = {};
  ulog.forEach(function(e) {
    if (!e.passed) return;
    var d = e.ts ? e.ts.slice(0,10) : '';
    if (d) dayMap[d] = (dayMap[d]||0) + 1;
  });
  var today = new Date(), streak = 0;
  for (var i = 0; i < 365; i++) {
    var dd = new Date(today); dd.setDate(dd.getDate()-i);
    var key = dd.toISOString().slice(0,10);
    if (dayMap[key]) streak++; else if (i > 0) break;
  }

  var initials = uname.substring(0,2).toUpperCase();
  var avatarInner = uavatar
    ? '<img src="' + uavatar + '" style="width:100%;height:100%;object-fit:cover">'
    : '<span>' + initials + '</span>';

  var easyT  = QUESTIONS.filter(function(q){return q.diff==='Easy';}).length;
  var medT   = QUESTIONS.filter(function(q){return q.diff==='Medium';}).length;
  var hardT  = QUESTIONS.filter(function(q){return q.diff==='Hard';}).length;

  var ghLink = uprof.github
    ? '<a href="' + (uprof.github.startsWith('http') ? uprof.github : 'https://' + uprof.github) + '" target="_blank" rel="noopener" style="color:var(--accent);font-family:var(--mono);font-size:11px;text-decoration:none">' + uprof.github + '</a>'
    : '';

  // Recent 5 solved questions
  var recentSolved = ulog.filter(function(e){ return e.passed; }).slice(0, 5);
  var recentHTML = recentSolved.length === 0
    ? '<div style="color:var(--text3);font-size:13px;padding:12px 0">No solved questions yet.</div>'
    : recentSolved.map(function(e) {
        var q = QUESTIONS.find(function(q){ return q.id === e.qid; });
        var diff = q ? q.diff : '';
        var diffColor = diff==='Easy'?'var(--easy-c)':diff==='Medium'?'var(--med-c)':'var(--hard-c)';
        return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">' +
          '<div style="width:28px;height:28px;border-radius:8px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--green);flex-shrink:0">✓</div>' +
          '<div style="flex:1;min-width:0;font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">#' + e.qid + ' ' + e.qtitle + '</div>' +
          (diff ? '<span style="font-size:10px;font-family:var(--mono);color:' + diffColor + '">' + diff + '</span>' : '') +
        '</div>';
      }).join('');

  var overlay = document.createElement('div');
  overlay.id = 'other-profile-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:1010;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(6px)';

  overlay.innerHTML =
    '<div style="background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:560px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden">' +

      // Header
      '<div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0">' +
        '<button onclick="document.getElementById(\'other-profile-overlay\').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);line-height:1">&#x2190;</button>' +
        '<span style="font-size:13px;font-weight:600;color:var(--text)">@' + uname + '\'s Profile</span>' +
        '<button onclick="document.getElementById(\'other-profile-overlay\').remove()" style="margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);line-height:1">&#x2715;</button>' +
      '</div>' +

      // Scrollable body
      '<div style="overflow-y:auto;flex:1;padding:20px">' +

        // Hero
        '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">' +
          '<div style="width:72px;height:72px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0">' + avatarInner + '</div>' +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-size:20px;font-weight:700;color:var(--text)">' + (uprof.displayName || uname) + (udata.isAdmin ? ' &#x1F451;' : '') + '</div>' +
            '<div style="font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:2px">@' + uname +
              (uprof.company ? ' &middot; ' + uprof.company : '') +
              (uprof.location ? ' &middot; ' + uprof.location : '') +
            '</div>' +
            (ghLink ? '<div style="margin-top:4px">' + ghLink + '</div>' : '') +
            (uprof.bio ? '<div style="font-size:13px;color:var(--text2);line-height:1.65;margin-top:8px">' + uprof.bio.replace(/</g,'&lt;') + '</div>' : '') +
          '</div>' +
        '</div>' +

        // Stats row
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px">' +
          '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--accent)">' + solvedIds.length + '</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Solved</div></div>' +
          '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--green)">' + streak + '</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Streak</div></div>' +
          '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--blue)">' + acc + '%</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Acceptance</div></div>' +
          '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--yellow)">' + ulog.length + '</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Submissions</div></div>' +
        '</div>' +

        // Difficulty bars
        '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px">' +
          '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono);margin-bottom:12px">Progress</div>' +
          ['Easy:'+easyS+'/'+easyT+':var(--easy-c)', 'Medium:'+medS+'/'+medT+':var(--med-c)', 'Hard:'+hardS+'/'+hardT+':var(--hard-c)'].map(function(row) {
            var parts = row.split(':'); var label=parts[0], nums=parts[1].split('/'), color=parts[2];
            var s=parseInt(nums[0]), t=parseInt(nums[1]);
            var pct = t ? Math.round(s/t*100) : 0;
            return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
              '<div style="font-size:11px;font-weight:600;color:'+color+';width:48px;font-family:var(--mono)">'+label+'</div>' +
              '<div style="flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden"><div style="height:100%;background:'+color+';border-radius:3px;width:'+pct+'%"></div></div>' +
              '<div style="font-size:11px;color:var(--text3);font-family:var(--mono);width:40px;text-align:right">'+s+'/'+t+'</div>' +
            '</div>';
          }).join('') +
        '</div>' +

        // Recent solved
        '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono);margin-bottom:8px">Recent Solved</div>' +
        recentHTML +

      '</div>' +
    '</div>';

  overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}


function handleUserCardClick(e) {
  var card = e.target.closest('.user-card-result');
  if (card) {
    var uname = card.getAttribute('data-uname');
    if (uname) showOtherUserProfile(uname);
  }
}

function showToast(msg) {
  var old = document.getElementById('save-toast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.id = 'save-toast';
  t.className = 'save-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.remove(); }, 2000);
}

async function showLogPanel() {
  var existing = document.getElementById('log-overlay');
  if (existing) { existing.remove(); return; }
  var log = await getLog();

  // Build stats
  var total = log.length;
  var passed = log.filter(function(e){ return e.passed; }).length;
  var failed = total - passed;
  var uniqueQ = new Set(log.map(function(e){ return e.qid; })).size;

  // Build grouped entries by date
  var groups = {};
  log.forEach(function(e) {
    var d = new Date(e.ts).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  var entriesHtml = '';
  if (total === 0) {
    entriesHtml = '<div style="text-align:center;padding:48px 24px;color:var(--text3)"><div style="font-size:32px;margin-bottom:12px">📭</div><div style="font-size:14px">No submissions yet</div><div style="font-size:12px;margin-top:6px">Solve some questions to see your log here</div></div>';
  } else {
    Object.entries(groups).forEach(function(entry) {
      var date = entry[0], items = entry[1];
      entriesHtml += '<div style="padding:0 20px"><div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:14px 0 8px;border-bottom:1px solid var(--border);margin-bottom:0">' + date + '</div></div>';
      items.forEach(function(e, idx) {
        var time = new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        var dsBadges = '';
        if (e.dsResults) {
          e.dsResults.forEach(function(r, i) {
            dsBadges += '<span style="font-size:10px;padding:2px 7px;border-radius:3px;margin-right:3px;background:' + (r?'var(--green-bg)':'var(--red-bg)') + ';color:' + (r?'var(--green)':'var(--red)') + ';border:1px solid ' + (r?'var(--green-border)':'var(--red-border)') + '">DS' + (i+1) + (r?' ✓':' ✗') + '</span>';
          });
        }
        var eid = 'log-entry-' + idx + '-' + e.qid;
        entriesHtml += '<div style="padding:12px 20px;border-bottom:1px solid var(--border);transition:background .12s" onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'\'">' +
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">' +
            '<span style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:' + (e.passed?'var(--green-bg)':'var(--red-bg)') + ';flex-shrink:0">' + (e.passed?'✓':'✗') + '</span>' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">#' + e.qid + ' ' + e.qtitle + '</div>' +
              '<div style="font-size:11px;color:var(--text3);margin-top:2px">' + time + ' &nbsp;·&nbsp; ' + (dsBadges||'<span style="color:var(--text3);font-size:10px">no dataset info</span>') + '</div>' +
            '</div>' +
            '<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;background:' + (e.passed?'var(--green-bg)':'var(--red-bg)') + ';color:' + (e.passed?'var(--green)':'var(--red)') + ';border:1px solid ' + (e.passed?'var(--green-border)':'var(--red-border)') + ';flex-shrink:0">' + (e.passed?'PASS':'FAIL') + '</span>' +
          '</div>' +
          '<div id="' + eid + '" style="display:none;margin-top:8px">' +
            '<div style="background:var(--text);color:#e8e2d8;border-radius:4px;padding:10px 12px;font-family:var(--mono);font-size:11px;line-height:1.7;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto">' + e.sql.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>' +
            '<button onclick="navigator.clipboard.writeText(atob(\'' + btoa(e.sql) + '\'))" style="margin-top:6px;padding:4px 10px;border:1px solid var(--border2);border-radius:3px;background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer">Copy SQL</button>' +
          '</div>' +
          '<button onclick="var el=document.getElementById(\'' + eid + '\');el.style.display=el.style.display===\'none\'?\'\':\'none\';this.textContent=el.style.display===\'\'?\'Hide SQL ▲\':\'View SQL ▼\'" style="margin-top:4px;padding:3px 8px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer">View SQL ▼</button>' +
        '</div>';
      });
    });
  }

  var overlay = document.createElement('div');
  overlay.id = 'log-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(26,23,20,.88);z-index:990;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML =
    '<div style="background:var(--surface);border:1px solid var(--border2);border-radius:10px;width:640px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;">' +
      // Header
      '<div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0">' +
        '<span style="font-family:var(--serif);font-size:17px;font-weight:600;flex:1">My Solution Log</span>' +
        '<button onclick="document.getElementById(\'log-overlay\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1">✕</button>' +
      '</div>' +
      // Stats bar
      (total > 0 ? '<div style="display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);flex-shrink:0">' +
        '<div style="padding:12px 16px;text-align:center;border-right:1px solid var(--border)"><div style="font-family:var(--serif);font-size:22px;font-weight:600;color:var(--text)">' + total + '</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Submissions</div></div>' +
        '<div style="padding:12px 16px;text-align:center;border-right:1px solid var(--border)"><div style="font-family:var(--serif);font-size:22px;font-weight:600;color:var(--green)">' + passed + '</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Passed</div></div>' +
        '<div style="padding:12px 16px;text-align:center;border-right:1px solid var(--border)"><div style="font-family:var(--serif);font-size:22px;font-weight:600;color:var(--red)">' + failed + '</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Failed</div></div>' +
        '<div style="padding:12px 16px;text-align:center"><div style="font-family:var(--serif);font-size:22px;font-weight:600;color:var(--accent)">' + uniqueQ + '</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Questions</div></div>' +
      '</div>' : '') +
      // Entries
      '<div style="overflow-y:auto;flex:1">' + entriesHtml + '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
}

// ADMIN PANEL
async function showAdminPanel() {
  var existing = document.getElementById('admin-overlay');
  if (existing) { existing.remove(); return; }
  var users = await getUsers();
  var rows = Object.entries(users).map(function(entry) {
    var uname = entry[0], data = entry[1];
    var created = new Date(data.createdAt).toLocaleDateString();
    return `<div class="admin-user-row">
      <span>${uname}${data.isAdmin?' 👑':''}</span>
      <span>${created}</span>
      <span style="font-size:10px;color:var(--text3)">${data.isAdmin?'Admin':'User'}</span>
      <span></span>
      <button class="admin-del-btn" onclick="adminDeleteUser('${uname}')">Delete</button>
    </div>`;
  }).join('');

  var overlay = document.createElement('div');
  overlay.id = 'admin-overlay';
  overlay.className = 'admin-overlay';
  overlay.innerHTML = `
    <div class="admin-card">
      <div class="admin-header">
        <span class="admin-title">👑 User Management</span>
        <button class="admin-close" onclick="var a=document.getElementById('admin-overlay');if(a)a.remove()">✕</button>
      </div>
      <div class="admin-body">
        <div class="admin-user-row header">
          <span>Username</span><span>Joined</span><span>Role</span><span></span><span>Action</span>
        </div>
        ${rows || '<div style="padding:20px;text-align:center;color:var(--text3)">No users yet</div>'}
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
}

async function adminDeleteUser(username) {
  if (username === currentUser.username) { alert("Can't delete yourself"); return; }
  if (!confirm('Delete user "' + username + '"? This cannot be undone.')) return;
  var users = await getUsers();
  delete users[username];
  await saveUsers(users);
  // Also clean up their data
  await storageSet('sql_log:' + username, []);
  await storageSet('sql_solved:' + username, []);
  var ex = document.getElementById('admin-overlay');
  if (ex) ex.remove();
  showAdminPanel();
}

var revealState = {}; // { qid: { hint:bool, tip:bool, sol:bool } }

var currentDialect = 'sqlite';
function setDialectFromSelect(d) { setDialect(d); }
function setDialect(d) {
  currentDialect = d;
  var sel = document.getElementById('dialect-select');
  var dn  = document.getElementById('dialect-note');
  var badge = document.getElementById('dialect-badge');
  if (sel) sel.value = d;
  if (dn)  dn.style.display = d === 'mysql' ? '' : 'none';
  if (badge) {
    if (d === 'mysql') {
      badge.style.background = 'var(--yellow-bg)'; badge.style.color = 'var(--yellow)'; badge.style.borderColor = 'var(--yellow-border)'; badge.textContent = '⚡ TRANSLATED';
    } else {
      badge.style.background = 'var(--green-bg)'; badge.style.color = 'var(--green)'; badge.style.borderColor = 'var(--green-border)'; badge.textContent = '● LIVE ENGINE';
    }
  }
}

function toggleGate(gateId, stateKey) {
  var body  = document.getElementById(gateId + '-body');
  var arrow = document.getElementById(gateId + '-arrow');
  var badge = document.getElementById(gateId + '-badge');
  if (!body) return;
  var isOpen = body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open', isOpen);
  if (badge) badge.textContent = isOpen ? 'HIDE' : 'REVEAL';
  if (stateKey && current) {
    if (!revealState[current.id]) revealState[current.id] = {};
    revealState[current.id][stateKey] = isOpen;
  }
}

function applyRevealState(p) {
  var state = revealState[p.id] || {};
  ['hint','tip','sol'].forEach(function(key) {
    if (state[key]) {
      var gid   = p.id + '-' + key;
      var body  = document.getElementById(gid + '-body');
      var arrow = document.getElementById(gid + '-arrow');
      var badge = document.getElementById(gid + '-badge');
      if (body)  body.classList.add('open');
      if (arrow) arrow.classList.add('open');
      if (badge) badge.textContent = 'HIDE';
    }
  });
}

function getCatTip(cat) {
  var tips = {
    "JOIN": "INNER JOIN returns only matching rows. LEFT JOIN keeps ALL left-table rows — unmatched right-side columns become NULL. Always join on the column that logically links the two tables.",
    "Self JOIN": "Join a table to itself using two aliases (e.g. e1, e2). Use this to compare rows within the same table — manager vs employee, yesterday vs today, consecutive rows.",
    "LEFT JOIN": "LEFT JOIN keeps every row from the left table even when there is no match. Unmatched right-side columns are NULL. Filter on IS NULL to find rows with no match.",
    "GROUP BY": "GROUP BY collapses rows with the same value into one group. SELECT can only contain grouped columns or aggregate functions (COUNT, SUM, AVG, MIN, MAX). Use HAVING to filter groups — WHERE runs before grouping, HAVING runs after.",
    "Window Function": "FUNC() OVER (PARTITION BY col ORDER BY col). Unlike GROUP BY, window functions do NOT collapse rows — every row is kept. Key functions: ROW_NUMBER (unique rank), RANK (ties get same rank, gaps after), DENSE_RANK (ties get same rank, no gaps), LAG/LEAD (previous/next row value).",
    "Subquery": "A query inside another query. Scalar subquery returns one value. IN subquery returns a list. Correlated subquery references the outer query and runs once per outer row — can be slow. Prefer JOINs or CTEs for readability.",
    "Aggregation": "COUNT(*) counts all rows. COUNT(col) skips NULLs. SUM, AVG, MIN, MAX all ignore NULLs. Use COUNT(DISTINCT col) to count unique values.",
    "CASE": "CASE WHEN condition THEN value ELSE default END. Use inside SELECT, WHERE, ORDER BY, or inside aggregate functions like SUM(CASE WHEN ... THEN 1 ELSE 0 END) to do conditional counting.",
    "Pivot": "Rotate rows into columns using conditional aggregation: SUM(CASE WHEN category='A' THEN amount ELSE 0 END) AS A. One CASE expression per output column. GROUP BY the row identifier.",
    "Island Problem": "Find consecutive sequences using the 'island' technique: ROW_NUMBER() OVER (ORDER BY date) minus the date gives a constant for each consecutive group. GROUP BY that constant to find the group, then HAVING COUNT(*) to filter by length.",
    "Recursive CTE": "WITH RECURSIVE cte AS (base_case UNION ALL recursive_step WHERE termination). Always include a termination condition. Use to traverse hierarchies, generate sequences, or walk graph paths.",
    "LAG/LEAD": "LAG(col, n) gets the value n rows BEFORE the current row. LEAD(col, n) gets n rows AFTER. Default n=1. Both need OVER (ORDER BY ...). Use PARTITION BY to restart within groups.",
    "UNION": "UNION removes duplicate rows (slower). UNION ALL keeps all rows including duplicates (faster). Column count and data types must match in both SELECT statements.",
    "DML": "UPDATE table SET col=value WHERE condition. DELETE FROM table WHERE condition. Without WHERE, affects ALL rows. INSERT INTO table (cols) VALUES (...). Use transactions for safety.",
    "String Functions": "SUBSTRING(str, start, length), UPPER(), LOWER(), CONCAT(a, b), LENGTH(), TRIM(), REPLACE(str, old, new), LIKE 'pattern%' for prefix match.",
    "REGEXP": "Regular expressions in SQL: ^ = start of string, $ = end, . = any char, * = zero or more, + = one or more, [A-Z] = character class. MySQL uses REGEXP or RLIKE operator.",
    "WHERE": "WHERE filters rows BEFORE grouping. Use AND / OR / NOT to combine conditions. NULL comparisons: use IS NULL / IS NOT NULL, never = NULL (always returns false).",
    "Set Operations": "UNION, INTERSECT, EXCEPT (or MINUS in Oracle). All require same column count and compatible types. INTERSECT returns only rows in both. EXCEPT returns rows in first but not second.",
    "Sorting / Intervals": "Sort intervals by start time first. To check overlap: interval A overlaps B if A.start < B.end AND A.end > B.start. To find the minimum rooms needed, use a min-heap tracking current end times.",
    "Heap / Intervals": "Sort by start time. Use a priority queue (min-heap) on end times. If earliest-ending meeting finishes before next starts, reuse that room — otherwise allocate a new one.",
    "Recursive CTE": "WITH RECURSIVE cte AS (base UNION ALL step). Always add WHERE to prevent infinite loops. SQLite supports recursive CTEs. Use for sequences, hierarchies, and graph traversal.",
    "UPDATE": "UPDATE table SET col = CASE WHEN condition THEN val1 ELSE val2 END. You can update multiple columns. Use a subquery in SET to compute values from other tables.",
    "Hash Map": "GROUP BY creates implicit hash maps. For explicit lookups, JOIN to a derived table or use a CTE. EXISTS and NOT EXISTS are hash-join friendly alternatives to IN / NOT IN.",
    "Iterator / Design": "Design problems test your ability to model state. Think about: what data structure stores state, what operations modify it, and how to return results efficiently.",
  };
  return tips[cat] || "Think about what tables you need, how to join them, how to filter, and how to aggregate. Break the problem into steps: SELECT what you need → FROM where → JOIN related tables → WHERE to filter → GROUP BY to aggregate → HAVING to filter groups → ORDER BY to sort.";
}
