<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Practice Arena — 100+ Questions</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
<style>
/* ── DARK THEME (default) ─────────────────────────────── */
:root {
  --bg:        #0f1117;
  --surface:   #161b27;
  --surface2:  #1d2235;
  --surface3:  #242c42;
  --border:    rgba(255,255,255,.09);
  --border2:   rgba(255,255,255,.17);
  --text:      #e8eaf0;
  --text2:     #8b90a0;
  --text3:     #4a5060;
  --accent:    #f97316;
  --accent2:   #fb923c;
  --accentglow: rgba(249,115,22,.22);
  --green:     #22c55e;
  --green-bg:  rgba(34,197,94,.12);
  --green-border: rgba(34,197,94,.28);
  --red:       #ef4444;
  --red-bg:    rgba(239,68,68,.12);
  --red-border:rgba(239,68,68,.28);
  --blue:      #60a5fa;
  --blue-bg:   rgba(96,165,250,.12);
  --yellow:    #eab308;
  --yellow-bg: rgba(234,179,8,.12);
  --yellow-border: rgba(234,179,8,.28);
  --mono:  'JetBrains Mono', 'Fira Code', monospace;
  --sans:  'Inter', system-ui, sans-serif;
  --serif: 'Inter', system-ui, sans-serif;
  --easy-c:  #22c55e; --easy-bg:  rgba(34,197,94,.12);
  --med-c:   #eab308; --med-bg:   rgba(234,179,8,.12);
  --hard-c:  #ef4444; --hard-bg:  rgba(239,68,68,.12);
  --orange:  #f97316; --radius: 10px;
  --editor-bg: #090b0f;
  --code-bg:   #090b0f;
  --topbar-bg: #0d1020;
  --run-bg:    #1d2235;
  --run-text:  #c9d1d9;
  --btn-primary-bg: #f97316;
  --btn-primary-text: #fff;
}
/* ── LIGHT THEME ──────────────────────────────────────── */
html.light {
  --bg:        #f8f9fb;
  --surface:   #ffffff;
  --surface2:  #f1f3f7;
  --surface3:  #e8ebf0;
  --border:    rgba(0,0,0,.08);
  --border2:   rgba(0,0,0,.14);
  --text:      #111318;
  --text2:     #5a6072;
  --text3:     #9299aa;
  --accent:    #ea6c0a;
  --accent2:   #f97316;
  --accentglow: rgba(234,108,10,.18);
  --green:     #16a34a;
  --green-bg:  rgba(22,163,74,.1);
  --green-border: rgba(22,163,74,.25);
  --red:       #dc2626;
  --red-bg:    rgba(220,38,38,.08);
  --red-border:rgba(220,38,38,.22);
  --blue:      #2563eb;
  --blue-bg:   rgba(37,99,235,.08);
  --yellow:    #ca8a04;
  --yellow-bg: rgba(202,138,4,.08);
  --yellow-border: rgba(202,138,4,.22);
  --easy-c:  #16a34a; --easy-bg:  rgba(22,163,74,.1);
  --med-c:   #ca8a04; --med-bg:   rgba(202,138,4,.1);
  --hard-c:  #dc2626; --hard-bg:  rgba(220,38,38,.08);
  --editor-bg: #1e2433;
  --code-bg:   #1e2433;
  --topbar-bg: #0d1020;
  --run-bg:    #f1f3f7;
  --run-text:  #111318;
  --btn-primary-bg: #ea6c0a;
  --btn-primary-text: #fff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

/* LAYOUT */
.app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

/* TOPBAR */
.topbar {
  display: flex; align-items: center; gap: 0;
  padding: 0 20px; height: 52px;
  background: #0d1020;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
/* topbar always dark — override light theme */
html.light .topbar { background: #0d1020; border-bottom-color: rgba(255,255,255,.08); }
.topbar-logo {
  font-family: var(--mono); font-size: 14px; font-weight: 700;
  letter-spacing: -.3px; margin-right: 28px;
  cursor: pointer; display: flex; align-items: center; gap: 0;
  text-decoration: none; user-select: none;
}
/* Logo is ALWAYS same — orange SQL, white/dark rest */
.logo-sql    { color: #f97316 !important; font-weight: 800; }
.logo-space  { width: 4px; display: inline-block; }
.logo-practice { color: #94a3b8; font-weight: 400; font-style: italic; }
.logo-arena  { color: #e2e4ea !important; font-weight: 700; }

/* Theme toggle */
.theme-toggle {
  width: 44px; height: 24px; border-radius: 12px;
  background: var(--surface3); border: 1.5px solid var(--border2);
  cursor: pointer; position: relative; transition: background .2s;
  flex-shrink: 0; margin-left: 4px;
}
.theme-toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); transition: transform .2s, background .2s;
}
html.light .theme-toggle { background: #e0e7ff; border-color: #c7d2fe; }
html.light .theme-toggle::after { transform: translateX(20px); background: #f97316; }
.theme-toggle-label { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-right: 6px; }
.topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,.12); margin: 0 16px; }
.topbar-stats { display: flex; gap: 20px; align-items: center; }
.tstat { font-size: 11px; color: #6a7080; font-family: var(--mono); }
.tstat strong { color: #c9d1e0; font-size: 12px; font-weight: 600; }
.tstat.solved strong { color: #22c55e; }
.tstat.streak strong { color: #f97316; }
.progress-pill { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.prog-track { width: 100px; height: 2px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); border-radius: 2px; transition: width .5s; }
.prog-label { font-size: 10px; color: var(--text3); font-family: var(--mono); min-width: 28px; text-align: right; }

/* MAIN SPLIT — question list drawer + content split */
.main { display: grid; grid-template-columns: 1fr; overflow: hidden; height: 100%; }

/* Question list — slide-over drawer */
.q-drawer {
  position: fixed; left: 0; top: 52px; bottom: 0; width: 300px; z-index: 200;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(-100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow: 4px 0 24px rgba(0,0,0,.1);
}
.q-drawer.open { transform: translateX(0); }
.q-drawer-backdrop {
  position: fixed; inset: 0; top: 52px; background: rgba(26,23,20,.4);
  z-index: 199; opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.q-drawer-backdrop.open { opacity: 1; pointer-events: auto; }

/* Drawer toggle button */
.drawer-toggle {
  position: fixed; left: 0; top: calc(52px + 50vh - 32px); z-index: 201;
  width: 24px; height: 64px; border-radius: 0 8px 8px 0;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: width .2s, background .15s;
  box-shadow: 2px 0 8px rgba(196,98,45,.3);
}
.drawer-toggle:hover { width: 28px; background: var(--accent2); }
.drawer-toggle-icon { color: #fff; font-size: 12px; transition: transform .25s; }
.drawer-toggle-icon.open { transform: rotate(180deg); }

/* Content area: question left | editor right */
.content-area {
  display: flex;
  height: 100%; overflow: hidden;
  margin-left: 24px; /* space for drawer toggle */
}

/* Left: question description pane */
.q-pane {
  flex: 0 0 42%; min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
.q-pane::-webkit-scrollbar { width: 3px; }
.q-pane::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.q-pane-header {
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 10;
  display: flex; align-items: center; gap: 10px;
}
.q-pane-nav { display: flex; gap: 4px; margin-left: auto; }
.q-nav-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text3); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all .13s;
}
.q-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.q-pane-body { padding: 16px 20px 24px; flex: 1; }

/* Right: editor pane */
.e-pane {
  flex: 1 1 0%; min-width: 260px;
  display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg);
  min-height: 0;
}
.e-pane-header {
  display: flex; align-items: stretch;
  background: var(--surface); flex-shrink: 0;
  border-bottom: 0; /* tabs handle their own border */
}
.e-pane-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; flex: 1; }
.e-pane-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.e-pane-body::-webkit-scrollbar { width: 3px; }
.e-pane-body::-webkit-scrollbar-thumb { background: var(--border2); }

/* Collapsible hint/solution sections in editor pane */


/* SIDEBAR */
/* ── SIDEBAR ──────────────────────────────────────────────────────────────── */
/* sidebar → q-drawer (see layout above) */

/* Search */
.search-wrap { padding: 12px; border-bottom: 1px solid var(--border); position: relative; }
.search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text3); pointer-events: none; }
.search-box {
  width: 100%; padding: 8px 10px 8px 32px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--surface2); color: var(--text);
  font-family: var(--mono); font-size: 12px; outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accentglow); }
.search-box::placeholder { color: var(--text3); }

/* Progress micro-bar inside sidebar */
.sidebar-progress { padding: 10px 14px 4px; display: flex; align-items: center; gap: 8px; }
.sp-track { flex: 1; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.sp-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width .6s cubic-bezier(.34,1.56,.64,1); }
.sp-label { font-size: 10px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }

/* Difficulty pills */
.diff-pills { display: flex; gap: 4px; padding: 10px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.fchip {
  flex: 1; min-width: 0; text-align: center;
  padding: 5px 4px; border-radius: 6px;
  font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
  font-family: var(--mono); border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text3); cursor: pointer;
  transition: all .15s;
}
.fchip:hover { color: var(--text); border-color: var(--accent); background: rgba(249,115,22,.08); }
.fchip.active             { background: var(--surface3); color: var(--text);  border-color: var(--border2); }
.fchip.easy.active        { background: rgba(34,197,94,.15);  color: var(--green);  border-color: rgba(34,197,94,.3); }
.fchip.med.active         { background: rgba(234,179,8,.15);  color: var(--yellow); border-color: rgba(234,179,8,.3); }
.fchip.hard.active        { background: rgba(239,68,68,.15);  color: var(--red);    border-color: rgba(239,68,68,.3); }
.fchip.solved-f.active    { background: rgba(34,197,94,.15);  color: var(--green);  border-color: rgba(34,197,94,.3); }
.fchip.unsolved-f.active  { background: rgba(249,115,22,.15); color: var(--accent); border-color: rgba(249,115,22,.3); }

/* Topic filter — horizontal scroll strip */
.topic-strip {
  display: flex; gap: 5px; padding: 8px 12px;
  overflow-x: auto; border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.topic-strip::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0;
  padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  border: 1px solid var(--border); background: var(--surface2); color: var(--text3); cursor: pointer;
  transition: all .13s; white-space: nowrap;
}
.cat-chip:hover { border-color: rgba(249,115,22,.4); color: var(--accent); background: rgba(249,115,22,.06); }
.cat-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Question count badge */
.q-count-badge {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 14px 2px; font-size: 10px; color: var(--text3); font-family: var(--mono);
}

.prob-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
.prob-list::-webkit-scrollbar { width: 4px; }
.prob-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

@keyframes rowSlideIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }

.prob-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; margin-bottom: 2px;
  border-radius: 8px; cursor: pointer;
  transition: background .12s;
  border: 1px solid transparent;
  animation: rowSlideIn .18s ease both;
}
.prob-row:hover { background: var(--surface2); border-color: var(--border); }
.prob-row.active {
  background: rgba(249,115,22,.08);
  border-color: rgba(249,115,22,.3);
}
.diff-badge-num {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; font-family: var(--mono);
}
.diff-badge-num.easy { background: var(--easy-bg);  color: var(--easy-c); }
.diff-badge-num.med  { background: var(--yellow-bg); color: var(--yellow); }
.diff-badge-num.hard { background: var(--red-bg);    color: var(--red); }

.prob-row-left { flex: 1; min-width: 0; }
.prob-row-num { font-size: 10px; color: var(--text3); margin-bottom: 2px; font-family: var(--mono); }
.prob-row-title { font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prob-row.active .prob-row-title { color: var(--accent); }

.solved-check {
  flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
  background: var(--green); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
}
.unsolved-stub { flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--surface3); }

/* PANEL */
/* panel → q-pane + e-pane (see layout above) */
.ph-num { font-size: 11px; color: var(--text3); }
.ph-title { font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--text); flex: 1; }
.diff-badge { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; font-family: var(--mono); letter-spacing: .04em; }
.diff-badge.easy { background: var(--easy-bg);  color: var(--easy-c);  border: 1px solid rgba(34,197,94,.2); }
.diff-badge.med  { background: var(--yellow-bg); color: var(--yellow);  border: 1px solid rgba(234,179,8,.2); }
.diff-badge.hard { background: var(--red-bg);    color: var(--red);     border: 1px solid rgba(239,68,68,.2); }
.cat-badge { padding: 3px 10px; border-radius: 20px; font-size: 10px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border); font-family: var(--mono); }

/* panel-tabs removed — hint/solution now in collapsible sections */
.ptab { padding: 10px 14px; font-size: 12px; font-family: var(--mono); color: var(--text3); border-bottom: 2px solid transparent; cursor: pointer; background: none; border-top: none; border-left: none; border-right: none; transition: all .13s; }
.ptab:hover { color: var(--text2); }
.ptab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* panel-body removed */

/* PROBLEM TAB */
.slabel { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; font-family: var(--mono); }
.desc { font-size: 13px; line-height: 1.9; color: var(--text2); white-space: pre-wrap; margin-bottom: 20px; font-family: var(--sans); }

.schema-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.schema-title { padding: 8px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text2); font-family: var(--mono); letter-spacing: .04em; }
.schema-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.schema-table th { padding: 6px 14px; text-align: left; color: var(--text3); font-weight: 500; border-bottom: 1px solid var(--border); background: var(--surface); font-family: var(--mono); }
.schema-table td { padding: 6px 14px; color: var(--text); border-bottom: 1px solid var(--border); font-family: var(--mono); }
.schema-table tr:last-child td { border-bottom: none; }
.pk { color: var(--accent); font-size: 10px; font-weight: 700; }

.example-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
.example-in { font-size: 11px; font-family: var(--mono); }
.example-in table { border-collapse: collapse; margin-bottom: 6px; }
.example-in th { padding: 4px 12px; background: var(--surface2); border: 1px solid var(--border); font-size: 11px; color: var(--text2); }
.example-in td { padding: 4px 12px; border: 1px solid var(--border); font-size: 11px; }
.example-out-label { font-size: 10px; color: var(--text3); margin: 10px 0 4px; text-transform: uppercase; letter-spacing: .08em; font-family: var(--mono); }
.example-explain { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.6; }

/* CODE TAB */
.code-area-wrap { position: relative; margin-bottom: 12px; }
textarea.code-editor {
  width: 100%;
  background: #0d1020; color: #c9d1d9;
  border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 18px; font-family: var(--mono); font-size: 13px; line-height: 1.75;
  resize: vertical; outline: none; transition: border-color .15s, box-shadow .15s;
  caret-color: var(--accent);
}
textarea.code-editor:focus { border-color: rgba(249,115,22,.4); box-shadow: 0 0 0 3px var(--accentglow); }
.run-row { display: flex; align-items: center; gap: 8px; }
.run-btn {
  padding: 8px 18px;
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  background: transparent;
  color: var(--text2);
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s; letter-spacing: .02em;
}
.run-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(249,115,22,.06);
}
.verdict-box { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 8px; font-family: var(--sans); }
.vpass { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.vfail { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-border); }

.tc-list { display: flex; flex-direction: column; gap: 8px; }
.tc-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.tc-card.pass { border-color: var(--green-border); }
.tc-card.fail { border-color: var(--red-border); }
.tc-header { padding: 8px 14px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: var(--sans); font-weight: 600; }
.tc-card.pass .tc-header { background: var(--green-bg); color: var(--green); }
.tc-card.fail .tc-header { background: var(--red-bg);   color: var(--red); }
.tc-body { padding: 10px 14px; background: var(--surface); }
.tc-row-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; font-family: var(--mono); }
.tc-data { font-size: 11px; font-family: var(--mono); color: var(--text); }
.tc-result-table { border-collapse: collapse; font-size: 11px; }
.tc-result-table th { padding: 4px 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
.tc-result-table td { padding: 4px 12px; border: 1px solid var(--border); font-family: var(--mono); }

/* HINT TAB */
.hint-card { background: rgba(234,179,8,.06); border: 1px solid rgba(234,179,8,.2); border-radius: 10px; padding: 16px 18px; }
.hint-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--yellow); margin-bottom: 10px; font-family: var(--mono); }
.hint-text { font-size: 13px; line-height: 1.85; color: var(--text2); }
.hint-steps { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.hint-steps li { font-size: 13px; color: var(--text2); line-height: 1.7; padding-left: 16px; position: relative; }
.hint-steps li::before { content: '→'; position: absolute; left: 0; color: var(--accent); }

/* SOLUTION TAB */
.solution-block { background: #0a0c10; border: 1px solid var(--border); border-radius: 10px; padding: 18px; font-family: var(--mono); font-size: 12px; line-height: 1.9; color: #c9d1d9; white-space: pre; overflow-x: auto; }
.sql-kw  { color: #ff7b72; }
.sql-fn  { color: #79c0ff; }
.sql-str { color: #a5d6ff; }
.sql-num { color: #ffa657; }
.sql-cmt { color: #8b949e; font-style: italic; }

/* PROGRESS OVERVIEW */
.overview-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
.ov-card { border: 1px solid var(--border); border-radius: 4px; padding: 14px; background: var(--bg); }
.ov-num { font-family: var(--serif); font-size: 28px; font-weight: 600; }
.ov-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
.ov-card.easy .ov-num { color: var(--easy-c); }
.ov-card.med .ov-num { color: var(--yellow); }
.ov-card.hard .ov-num { color: var(--red); }

/* SQL RUNNER NOTE */
.sql-note { background: var(--blue-bg); border: 1px solid #b8cfe8; border-radius: 4px; padding: 10px 14px; font-size: 12px; color: var(--blue); margin-bottom: 12px; line-height: 1.6; }

/* CATEGORY FILTER */
/* cat-chip styles moved to sidebar section */
/* ── AUTH OVERLAY ──────────────────────────────────────────────────────────── */
/* ═══════════════════════════════════════════════════════
   AUTH — full-screen cinematic login
═══════════════════════════════════════════════════════ */
@keyframes authFadeIn    { from{opacity:0} to{opacity:1} }
@keyframes authSlideUp   { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
@keyframes authSlideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes gridScroll    { from{background-position:0 0} to{background-position:0 80px} }
@keyframes glowPulse     { 0%,100%{opacity:.4} 50%{opacity:.8} }
@keyframes loginSuccess  { 0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1);opacity:0} }
@keyframes typeCursor    { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes floatUp       { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.auth-overlay {
  position:fixed;inset:0;z-index:1000;
  display:grid;grid-template-columns:1fr 1fr;
  animation:authFadeIn .3s ease;
  font-family:var(--mono);
}

/* Left panel — dark hero */
.auth-left {
  background:#0d0b09;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
  padding:60px 56px;
}
.auth-grid-bg {
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(196,98,45,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(196,98,45,.07) 1px, transparent 1px);
  background-size:40px 40px;
  animation:gridScroll 4s linear infinite;
}
.auth-glow {
  position:absolute;top:-120px;left:-80px;
  width:400px;height:400px;
  background:radial-gradient(circle, rgba(196,98,45,.18) 0%, transparent 70%);
  animation:glowPulse 3s ease-in-out infinite;
  pointer-events:none;
}
.auth-glow2 {
  position:absolute;bottom:-100px;right:-60px;
  width:300px;height:300px;
  background:radial-gradient(circle, rgba(224,120,64,.12) 0%, transparent 70%);
  animation:glowPulse 4s ease-in-out infinite reverse;
  pointer-events:none;
}
.auth-hero { position:relative;z-index:2;animation:authSlideDown .6s ease .1s both; }
.auth-hero-eyebrow {
  font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.auth-hero-eyebrow::before {
  content:'';display:block;width:24px;height:1px;background:var(--accent);
}
.auth-hero-title {
  font-family:var(--serif);font-size:42px;line-height:1.1;font-weight:600;
  color:#f5f2eb;margin-bottom:20px;
}
.auth-hero-title em { color:var(--accent);font-style:italic; }
.auth-hero-desc { font-size:13px;color:#8a8070;line-height:1.8;max-width:320px;margin-bottom:40px; }

/* Animated SQL code snippet */
.auth-code-block {
  background:rgba(255,255,255,.04);border:1px solid rgba(196,98,45,.2);
  border-radius:8px;padding:16px 18px;font-size:11px;line-height:1.8;
  color:#a09080;position:relative;overflow:hidden;
  animation:authSlideUp .6s ease .3s both;
}
.auth-code-block::before {
  content:''; position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.code-kw  { color:#c4622d; }
.code-fn  { color:#e07840; }
.code-str { color:#8aaa70; }
.code-cmt { color:#504840;font-style:italic; }
.code-cursor { display:inline-block;width:2px;height:12px;background:var(--accent);
  animation:typeCursor .8s ease infinite;vertical-align:middle;margin-left:1px; }

/* Feature pills */
.auth-features { display:flex;flex-direction:column;gap:10px;animation:authSlideUp .6s ease .5s both; }
.auth-feat {
  display:flex;align-items:center;gap:10px;
  font-size:12px;color:#6a6058;
}
.auth-feat-icon {
  width:28px;height:28px;border-radius:6px;
  background:rgba(196,98,45,.12);border:1px solid rgba(196,98,45,.2);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  flex-shrink:0;
}

/* Right panel — form */
.auth-right {
  background:var(--surface);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:60px 56px;position:relative;
}
.auth-right::before {
  content:'';position:absolute;left:0;top:20%;bottom:20%;width:1px;
  background:linear-gradient(transparent,var(--border),transparent);
}
.auth-form-wrap { width:100%;max-width:340px;animation:authSlideUp .5s ease .2s both; }
.auth-form-title {
  font-family:var(--serif);font-size:26px;font-weight:600;
  color:var(--text);margin-bottom:6px;
}
.auth-form-sub { font-size:12px;color:var(--text3);margin-bottom:32px;line-height:1.6; }

/* Mode switcher */
.auth-mode-row { display:flex;gap:0;margin-bottom:28px;border-radius:8px;overflow:hidden;border:1.5px solid var(--border2); }
.auth-mode-btn {
  flex:1;padding:9px;text-align:center;font-size:12px;font-weight:600;
  font-family:var(--mono);cursor:pointer;background:transparent;
  color:var(--text3);border:none;transition:all .15s;letter-spacing:.04em;
}
.auth-mode-btn.active { background:var(--text);color:var(--bg); }

/* Fields */
.auth-field-new { margin-bottom:18px;position:relative; }
.auth-field-new label {
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);display:block;margin-bottom:7px;
}
.auth-field-new input {
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:8px;
  background:var(--bg);color:var(--text);
  font-family:var(--mono);font-size:13px;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.auth-field-new input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(196,98,45,.12);
}
.auth-field-new input::placeholder { color:var(--text3); }

/* Submit button */
.auth-submit {
  width:100%;padding:13px;background:var(--accent);border:none;border-radius:8px;
  color:#fff;font-family:var(--mono);font-size:13px;font-weight:700;
  cursor:pointer;margin-top:4px;letter-spacing:.04em;
  position:relative;overflow:hidden;transition:background .15s,transform .1s;
}
.auth-submit:hover { background:var(--accent2);transform:translateY(-1px); }
.auth-submit:active { transform:translateY(0); }
.auth-submit::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.15) 50%,transparent 100%);
  transform:translateX(-100%);transition:transform .4s;
}
.auth-submit:hover::after { transform:translateX(100%); }

/* Message */
.auth-msg-new {
  font-size:12px;margin-top:12px;text-align:center;min-height:18px;
  padding:6px 10px;border-radius:6px;transition:all .2s;
}
.auth-msg-new.err { background:var(--red-bg);color:var(--red);border:1px solid var(--red-border); }
.auth-msg-new.ok  { background:var(--green-bg);color:var(--green);border:1px solid var(--green-border); }

/* Divider */
.auth-divider { display:flex;align-items:center;gap:10px;margin:20px 0;color:var(--text3);font-size:11px; }
.auth-divider::before,.auth-divider::after { content:'';flex:1;height:1px;background:var(--border); }

.auth-guest-btn {
  width:100%;padding:10px;border:1.5px solid var(--border2);border-radius:8px;
  background:transparent;color:var(--text3);font-family:var(--mono);font-size:12px;
  cursor:pointer;transition:all .15s;
}
.auth-guest-btn:hover { border-color:var(--border2);color:var(--text2);background:var(--surface2); }

/* Success transition overlay */
.auth-success-flash {
  position:fixed;inset:0;z-index:1100;
  background:rgba(10,12,20,.94);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:center;
  animation:authFadeIn .2s ease;pointer-events:none;overflow:hidden;
}
.auth-success-flash::before {
  content:'';position:absolute;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle, rgba(249,115,22,.1) 0%, transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:glowPulse 2.5s ease infinite;
}
.auth-success-text {
  font-family:var(--sans);font-size:26px;font-weight:700;color:#fff;
  position:relative;z-index:1;
  animation:authSlideUp .4s cubic-bezier(.34,1.56,.64,1);
}

/* Mobile: stack vertically */
@media(max-width:700px){
  .auth-overlay{grid-template-columns:1fr;overflow-y:auto;}
  .auth-left{display:none;}
  .auth-right{min-height:100vh;padding:40px 28px;}
}

/* ── USER BAR ──────────────────────────────────────────────────────────────── */
.user-chip { display:flex;align-items:center;gap:8px; }
.user-avatar { width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:var(--sans);flex-shrink:0; }
.user-name { font-size:12px;color:#c9d1e0;font-family:var(--sans); }
.logout-btn { font-size:11px;padding:4px 10px;border:1px solid rgba(255,255,255,.14);border-radius:6px;background:rgba(255,255,255,.06);color:#8b90a0;cursor:pointer;font-family:var(--sans);transition:all .13s; }
.logout-btn:hover { border-color:rgba(249,115,22,.6);color:#f97316;background:rgba(249,115,22,.08); }

/* ── SOLUTION LOG PANEL ────────────────────────────────────────────────────── */
.log-panel { padding:0; }
.log-entry { padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px; }
.log-entry:last-child { border-bottom:none; }
.log-meta { display:flex;align-items:center;gap:10px;margin-bottom:6px; }
.log-qid  { font-size:10px;color:var(--text3); }
.log-qtitle { font-weight:600;color:var(--text);font-size:12px;flex:1; }
.log-time { font-size:10px;color:var(--text3); }
.log-verdict { font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px; }
.log-verdict.pass { background:var(--green-bg);color:var(--green); }
.log-verdict.fail { background:var(--red-bg);color:var(--red); }
.log-code { background:var(--text);color:#e8e2d8;border-radius:3px;padding:8px 10px;font-family:var(--mono);font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:100px;overflow:hidden;cursor:pointer;position:relative; }
.log-code::after { content:'click to expand';position:absolute;bottom:4px;right:8px;font-size:9px;color:#888; }
.log-code.expanded { max-height:none; }
.log-code.expanded::after { display:none; }
.log-empty { padding:32px;text-align:center;color:var(--text3);font-size:13px; }

/* ── BLUR REVEAL ───────────────────────────────────────────────────────────── */
.reveal-gate { border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;background:var(--surface); }
.reveal-gate-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--surface2);cursor:pointer;
  user-select:none;transition:background .13s;
}
.reveal-gate-header:hover { background:var(--surface3); }
.reveal-gate-title { font-size:13px;font-weight:600;color:var(--text);font-family:var(--sans); }
.reveal-gate-arrow { font-size:11px;color:var(--text3);transition:transform .2s;display:inline-block;font-family:var(--mono); }
.reveal-gate-arrow.open { transform:rotate(90deg); }
.reveal-gate-badge { font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--accent);color:#fff;letter-spacing:.04em;font-family:var(--mono); }
.reveal-gate-body { display:none;padding:14px 16px;border-top:1px solid var(--border); }
.reveal-gate-body.open { display:block; }
.reveal-gate-icon { font-size:15px;margin-right:8px; }

/* ── MULTI-DATASET TABS ────────────────────────────────────────────────────── */
.ds-tabs { display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap; }
.ds-tab[data-size="large"] { opacity:.85; }
.dialect-switch { display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--surface2); }
.dialect-btn { padding:5px 14px;font-size:11px;font-family:var(--mono);border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .13s;font-weight:500; }
.dialect-btn.active { background:var(--surface3);color:var(--text);font-weight:700; }
.ds-tab { padding:4px 12px;border-radius:20px;font-size:11px;font-family:var(--mono);border:1px solid var(--border);background:var(--surface2);color:var(--text3);cursor:pointer;transition:all .13s;font-weight:500; }
.ds-tab:hover { border-color:rgba(249,115,22,.4);color:var(--accent); }
.ds-tab.active { background:var(--surface3);color:var(--text);border-color:var(--border2); }
.ds-tab.pass   { border-color:var(--green-border);color:var(--green);background:var(--green-bg); }
.ds-tab.fail   { border-color:var(--red-border);color:var(--red);background:var(--red-bg); }
.ds-summary { font-size:12px;margin-bottom:12px;color:var(--text2); }

/* ── ADMIN PANEL ───────────────────────────────────────────────────────────── */
.admin-overlay { position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:1010;display:flex;align-items:center;justify-content:center; }
.admin-card { background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:600px;max-width:95vw;max-height:85vh;overflow:hidden;display:flex;flex-direction:column; }
.admin-header { padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center; }
.admin-title { font-family:var(--serif);font-size:16px;font-weight:600;flex:1; }
.admin-close { background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:0 4px; }
.admin-body { overflow-y:auto;flex:1; }
.admin-user-row { display:grid;grid-template-columns:1fr 80px 80px 80px 100px;gap:8px;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);font-size:12px; }
.admin-user-row.header { background:var(--surface2);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em; }
.admin-del-btn { padding:3px 8px;border:1px solid var(--red-border);background:var(--red-bg);color:var(--red);border-radius:3px;font-size:11px;cursor:pointer;font-family:var(--mono); }


/* ── LANDING ──────────────────────────────────────────────────────────────── */
.landing-overlay { position:fixed;inset:0;background:var(--bg);z-index:950;overflow-y:auto; }
.landing-inner { max-width:820px;margin:0 auto;padding:60px 32px; }
.landing-hero { font-family:var(--serif);font-size:42px;font-weight:600;line-height:1.15;color:var(--text);margin-bottom:12px; }
.landing-hero em { color:var(--accent);font-style:italic; }
.landing-sub { font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:40px;max-width:600px; }
.landing-features { display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:40px; }
.feat-card { background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px; }
.feat-icon { font-size:22px;margin-bottom:10px; }
.feat-title { font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px; }
.feat-desc { font-size:12px;color:var(--text2);line-height:1.7; }
.landing-cta { display:flex;gap:12px;flex-wrap:wrap; }
.cta-btn { padding:12px 28px;border-radius:4px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;border:none; }
.cta-primary { background:var(--accent);color:#fff; }
.cta-primary:hover { background:var(--accent2); }
.cta-secondary { background:transparent;border:1px solid var(--border2);color:var(--text2); }
.cta-secondary:hover { border-color:var(--accent);color:var(--accent); }

/* ── SUBMIT CELEBRATION / MOTIVATION ───────────────────────────────────────── */
@keyframes fadeSlideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes popIn       { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
@keyframes confettiFall{ 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
@keyframes shimmer     { 0%{background-position:200% center} 100%{background-position:-200% center} }
@keyframes pulse-ring  { 0%{transform:scale(0.9);opacity:0.8} 50%{transform:scale(1.05);opacity:1} 100%{transform:scale(0.9);opacity:0.8} }
@keyframes wiggle      { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-5deg)} 75%{transform:rotate(5deg)} }

.submit-overlay {
  position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;
  background:rgba(10,10,15,.75);backdrop-filter:blur(4px);
  animation:fadeSlideUp .25s ease;
}
.submit-card {
  background:var(--surface);border-radius:16px;padding:40px 48px;text-align:center;
  max-width:520px;width:92vw;position:relative;overflow:hidden;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.submit-card.success { border:2px solid var(--green); }
.submit-card.partial { border:2px solid var(--orange); }
.submit-card.failure { border:2px solid var(--red); }

.submit-emoji { font-size:64px;display:block;margin-bottom:16px;animation:wiggle .6s ease .2s; }
.submit-headline { font-family:var(--serif);font-size:26px;font-weight:600;margin-bottom:8px;line-height:1.2; }
.submit-headline.success { color:var(--green); }
.submit-headline.partial { color:var(--orange); }
.submit-headline.failure { color:var(--red); }

.submit-msg { font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px; }

.ds-scoreboard { display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:24px; }
.ds-score-chip {
  display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:600;font-family:var(--mono);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
.ds-score-chip.pass { background:var(--green-bg);color:var(--green);border:1px solid var(--green-border); }
.ds-score-chip.fail { background:var(--red-bg);color:var(--red);border:1px solid var(--red-border); }
.ds-score-chip.err  { background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border); }

.submit-score-bar { margin:0 auto 24px;width:200px;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden; }
.submit-score-fill { height:100%;border-radius:4px;transition:width 1s cubic-bezier(.34,1.56,.64,1); }
.submit-score-fill.success { background:var(--green); }
.submit-score-fill.partial { background:var(--orange); }
.submit-score-fill.failure { background:var(--red); }

.submit-actions { display:flex;gap:10px;justify-content:center; }
.submit-close-btn { padding:10px 24px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--mono);font-size:13px;cursor:pointer; }
.submit-close-btn:hover { border-color:var(--accent);color:var(--accent); }
.submit-next-btn  { padding:10px 24px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer; }
.submit-next-btn:hover { background:var(--accent2); }

.confetti-piece {
  position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:900;
  animation:confettiFall linear forwards;
}

/* shimmer on success headline */
.shimmer-text {
  background:linear-gradient(90deg, var(--green) 0%, #7effc4 50%, var(--green) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;
}

/* ── RIGHT PANE TABS ─────────────────────────────────────────────────────── */
.e-tabs {
  display: flex; align-items: stretch; gap: 2px;
  background: var(--surface); flex-shrink: 0;
  padding: 8px 12px 0; border-bottom: 1px solid var(--border);
}
.e-tab {
  padding: 8px 16px; font-size: 12px; font-family: var(--sans); font-weight: 500;
  color: var(--text3); border: none; background: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  transition: color .15s, border-color .15s;

<div class="app">

  <div class="topbar-divider"></div>&nbsp;<button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);cursor:pointer;font-size:11px;color:#8b90a0;font-family:var(--mono);transition:all .15s"><span id="theme-icon">&#127769;</span><span id="theme-label">Dark</span></button>

<script>
const QUESTIONS = [
// ═══════════════════════════════════════════════════════════
// EASY (1–36)
// ═══════════════════════════════════════════════════════════
{
  id:1, title:"Combine Two Tables", diff:"Easy", cat:"JOIN",
  desc:`Write a SQL query to report the first name, last name, city, and state of each person in the Person table, regardless of whether that person has an address in the Address table.`,
  schema:[
    {name:"Person", cols:[["personId","int","PK"],["lastName","varchar",""],["firstName","varchar",""]]},
    {name:"Address", cols:[["addressId","int","PK"],["personId","int","FK"],["city","varchar",""],["state","varchar",""]]}
  ],
  examples:[{
    input:{Person:["personId,lastName,firstName","1,Wang,Allen","2,Alice,Bob"],Address:["addressId,personId,city,state","1,2,New York City,New York","2,3,Leetcode,California"]},
    output:"firstName,lastName,city,state\nAllen,Wang,null,null\nBob,Alice,New York City,New York",
    explain:"Person 1 (Allen Wang) has no address entry, so city/state are null."
  }],
  hint:"Use a LEFT JOIN from Person to Address on personId. LEFT JOIN keeps all rows from the left table even without a match.",
  solution:`SELECT p.firstName, p.lastName, a.city, a.state
FROM Person p
LEFT JOIN Address a ON p.personId = a.personId;`,
  explanation:[{"clause": "SELECT p.firstName, p.lastName, a.city, a.state", "explain": "Select the four required columns \u2014 two from Person (p), two from Address (a). Using table aliases keeps the query readable."}, {"clause": "FROM Person p", "explain": "Start from the Person table, aliased as 'p'. This is the LEFT table \u2014 every row here will appear in the result."}, {"clause": "LEFT JOIN Address a ON p.personId = a.personId", "explain": "LEFT JOIN keeps ALL rows from Person, even if there is no matching Address row. For unmatched rows, city and state will be NULL. INNER JOIN would drop people with no address."}],
    testFn: (sql) => {
    const s = sql.toLowerCase();
    return s.includes("left join") && s.includes("person") && s.includes("address") && s.includes("firstname") && s.includes("lastname");
  }
},
{
  id:2, title:"Second Highest Salary", diff:"Easy", cat:"Subquery",
  desc:`Write a SQL query to find the second highest salary from the Employee table. If there is no second highest salary, the query should report null.`,
  schema:[{name:"Employee", cols:[["id","int","PK"],["salary","int",""]]}],
  examples:[{
    input:{Employee:["id,salary","1,100","2,200","3,300"]},
    output:"SecondHighestSalary\n200",
    explain:"300 is highest, 200 is second highest."
  }],
  hint:"Use LIMIT with OFFSET, or a subquery with MAX where salary < max salary. Wrap in SELECT to return NULL if no result exists.",
  solution:`SELECT MAX(salary) AS SecondHighestSalary
FROM Employee
WHERE salary < (SELECT MAX(salary) FROM Employee);`,
  explanation:[{"clause": "SELECT MAX(salary) AS SecondHighestSalary", "explain": "MAX() of the filtered set gives us the highest value among salaries that are not the overall maximum \u2014 which is exactly the second highest."}, {"clause": "FROM Employee WHERE salary < (SELECT MAX(salary) FROM Employee)", "explain": "The subquery finds the highest salary. The outer WHERE excludes it. This handles ties correctly: if two employees share the max salary, both are excluded and the next distinct value is returned."}],
    testFn: (sql) => {
    const s = sql.toLowerCase();
    return s.includes("max") && s.includes("salary") && (s.includes("where") || s.includes("limit"));
  }
},
{
  id:3, title:"Duplicate Emails", diff:"Easy", cat:"GROUP BY",
  desc:`Write a SQL query to report all the duplicate emails. Note that it's guaranteed there is no null value in the Email column.`,
  schema:[{name:"Person", cols:[["id","int","PK"],["email","varchar",""]]}],
  examples:[{
    input:{Person:["id,email","1,a@b.com","2,c@d.com","3,a@b.com"]},
    output:"Email\na@b.com",
    explain:"a@b.com appears twice."
  }],
  hint:"GROUP BY email, then HAVING COUNT(*) > 1 to keep only emails that appear more than once.",
  solution:`SELECT email AS Email
FROM Person
GROUP BY email
HAVING COUNT(*) > 1;`,
  explanation:[{"clause": "SELECT email AS Email", "explain": "Select the email column, aliased to match the expected output column name."}, {"clause": "FROM Person GROUP BY email", "explain": "GROUP BY collapses all rows with the same email into one group, so we can count how many times each email appears."}, {"clause": "HAVING COUNT(*) > 1", "explain": "HAVING filters AFTER grouping (unlike WHERE which filters before). COUNT(*) > 1 keeps only emails that appear more than once \u2014 these are the duplicates."}],
    testFn: (sql) => sql.toLowerCase().includes("group by") && sql.toLowerCase().includes("having")
},
{
  id:4, title:"Customers Who Never Order", diff:"Easy", cat:"Subquery",
  desc:`Write a SQL query to report all customers who never order anything. Return the customer names sorted in any order.`,
  schema:[
    {name:"Customers", cols:[["id","int","PK"],["name","varchar",""]]},
    {name:"Orders", cols:[["id","int","PK"],["customerId","int","FK"]]}
  ],
  examples:[{
    input:{Customers:["id,name","1,Joe","2,Henry","3,Sam","4,Max"],Orders:["id,customerId","1,3","2,1"]},
    output:"Customers\nHenry\nMax"
  }],
  hint:"Use NOT IN with a subquery selecting all customerIds from Orders, or use LEFT JOIN ... WHERE Orders.id IS NULL.",
  solution:`SELECT name AS Customers
FROM Customers
WHERE id NOT IN (SELECT customerId FROM Orders);`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("not in") || (s.includes("left join") && s.includes("null")); }
},
{
  id:5, title:"Rising Temperature", diff:"Easy", cat:"Self JOIN",
  desc:`Write a SQL query to find all dates' id with higher temperature compared to the previous date (yesterday). Return the IDs in any order.`,

{
  id:10, title:"Human Traffic of Stadium", diff:"Easy", cat:"Window Function",
  desc:`Write a SQL query to display the records with three or more rows with consecutive id's, AND the number of people is greater than or equal to 100 for each.`,
  schema:[{name:"Stadium", cols:[["id","int","PK"],["visit_date","date",""],["people","int",""]]}],
  examples:[{
    input:{Stadium:["id,visit_date,people","1,2017-01-01,10","2,2017-01-02,109","3,2017-01-03,150","4,2017-01-04,99","5,2017-01-05,145","6,2017-01-06,1455","7,2017-01-07,199","8,2017-01-08,188"]},
    output:"id,visit_date,people\n5,2017-01-05,145\n6,2017-01-06,1455\n7,2017-01-07,199\n8,2017-01-08,188"
  }],
  hint:"Filter rows with people >= 100 first. Then use window functions (LAG/LEAD) or self-joins to check if id-1 and id+1 also satisfy the condition.",
  solution:`WITH filtered AS (
  SELECT * FROM Stadium WHERE people >= 100
),
consecutive AS (
  SELECT id, visit_date, people,
    id - ROW_NUMBER() OVER (ORDER BY id) AS grp
  FROM filtered
)
SELECT id, visit_date, people
FROM consecutive
WHERE grp IN (
  SELECT grp FROM consecutive GROUP BY grp HAVING COUNT(*) >= 3
)
ORDER BY id;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("people") && s.includes("100"); }

  id:15, title:"Find All Numbers Disappeared in Array", diff:"Easy", cat:"Set Operations",
  desc:`Given a table with a column of integers in range [1,n], write a query to find all integers from 1 to (SELECT MAX(num) FROM nums) that do NOT appear in the table.`,
  schema:[{name:"nums", cols:[["num","int",""]]}],
  examples:[{
    input:{nums:["num","4","3","2","7","8","2","3","1"]},
    output:"missing\n5\n6"
  }],
  hint:"Generate a sequence 1..n using a recursive CTE or a numbers table, then LEFT JOIN / NOT IN against the nums table.",
  solution:`WITH RECURSIVE seq AS (
  SELECT 1 AS n

  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("not in") || (s.includes("left join") && s.includes("null")); }
},

  id:19, title:"Rank Scores", diff:"Easy", cat:"Window Function",
  desc:`Write a query to rank the scores. The ranking should be calculated according to the following rules: The scores should be ranked from the highest to the lowest. If there is a tie, both should have the same ranking. After a tie, the next ranking number should be the next consecutive integer (dense rank).`,
  schema:[{name:"Scores", cols:[["id","int","PK"],["score","decimal(4,2)",""]]}],
  examples:[{

    testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("dense_rank") || (s.includes("rank") && s.includes("over")); }

{
  id:21, title:"Nth Highest Salary", diff:"Easy", cat:"Subquery",
  desc:`Write a SQL query to get the nth highest salary from the Employee table. If there is no nth highest salary, return null. Create a function getNthHighestSalary(N INT).`,
  schema:[{name:"Employee", cols:[["id","int","PK"],["salary","int",""]]}],
  examples:[{
    input:{Employee:["id,salary","1,100","2,200","3,300"]},
    output:"getNthHighestSalary(2)\n200"
  }],
  hint:"Use LIMIT with OFFSET (N-1). Or use DENSE_RANK() and filter for rank = N. Wrap in a function.",
  solution:`CREATE FUNCTION getNthHighestSalary(N INT) RETURNS INT

  RETURN (
    SELECT DISTINCT salary
    FROM Employee
    ORDER BY salary DESC

{
  id:25, title:"Average Selling Price", diff:"Easy", cat:"Aggregation",
  desc:`Write a SQL query to find the average selling price for each product. Return the result rounded to 2 decimal places. If a product does not have any sold units, its average selling price is 0.`,
  schema:[
    {name:"Prices", cols:[["product_id","int","PK"],["start_date","date","PK"],["end_date","date","PK"],["price","int",""]]},
    {name:"UnitsSold", cols:[["product_id","int",""],["purchase_date","date",""],["units","int",""]]}
  ],
  examples:[{
    input:{Prices:["product_id,start_date,end_date,price","1,2019-02-17,2019-02-28,5","1,2019-03-01,2019-03-22,20","2,2019-02-01,2019-02-20,15","2,2019-02-21,2019-03-31,30"],

  solution:`SELECT p.product_id,

{
  id:37, title:"Nth Highest Salary (Medium)", diff:"Medium", cat:"Window Function",
  desc:`Write a SQL query to get the nth highest distinct salary from the Employee table. Return null if no nth highest salary exists.`,
  schema:[{name:"Employee", cols:[["id","int","PK"],["salary","int",""]]}],
  examples:[{
    input:{Employee:["id,salary","1,100","2,200","3,300"]},
    output:"getNthHighestSalary(2)\n200"
  }],
  hint:"Use DENSE_RANK() OVER (ORDER BY salary DESC) to assign ranks, then filter WHERE rank = N. This handles duplicates correctly.",
  solution:`WITH ranked AS (
  SELECT salary, DENSE_RANK() OVER (ORDER BY salary DESC) AS rnk
  FROM Employee
)
SELECT MAX(salary) AS getNthHighestSalary
FROM ranked WHERE rnk = N;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("dense_rank") || (s.includes("rank") && s.includes("over")); }
},
{
  id:38, title:"Department Highest Salary", diff:"Medium", cat:"Subquery",
  desc:`Write a SQL query to find employees who have the highest salary in each of the departments. Return the result in any order.`,
  schema:[
    {name:"Employee", cols:[["id","int","PK"],["name","varchar",""],["salary","int",""],["departmentId","int","FK"]]},

  examples:[{
    input:{Employee:["id,name,salary,departmentId","1,Joe,70000,1","2,Jim,90000,1","3,Henry,80000,2","4,Sam,60000,2","5,Max,90000,1"],Department:["id,name","1,IT","2,Sales"]},

{

{
  id:41, title:"Department Top Three Salaries", diff:"Medium", cat:"Window Function",
  desc:`A company's executives are interested in seeing who earns a lot of money. Write a query to find employees who are high earners in each of the departments (top 3 unique salaries per department). Return in any order.`,
  schema:[
    {name:"Employee", cols:[["id","int","PK"],["name","varchar",""],["salary","int",""],["departmentId","int","FK"]]},
    {name:"Department", cols:[["id","int","PK"],["name","varchar",""]]}
  ],
  examples:[{
    input:{Employee:["id,name,salary,departmentId","1,Joe,85000,1","2,Henry,80000,2","3,Sam,60000,2","4,Max,90000,1","5,Janet,69000,1","6,Randy,85000,1","7,Will,70000,1"],Department:["id,name","1,IT","2,Sales"]},

{
  id:42, title:"Exchange Seats", diff:"Medium", cat:"CASE",
  desc:`Write a SQL query to swap the seat id of every two consecutive students. If the number of students is odd, the last student's seat is unchanged. Return the result ordered by id.`,
  schema:[{name:"Seat", cols:[["id","int","PK"],["student","varchar",""]]}],
  examples:[{
    input:{Seat:["id,student","1,Abbot","2,Doris","3,Emerson","4,Green","5,Jeames"]},
    output:"id,student\n1,Doris\n2,Abbot\n3,Green\n4,Emerson\n5,Jeames"
  }],
  hint:"CASE: if id is odd and id < MAX(id), return id+1. If id is even, return id-1. Otherwise return id (odd last). SELECT with this new id ORDER BY id.",
  solution:`SELECT
  CASE WHEN id % 2 = 1 AND id < (SELECT COUNT(*) FROM Seat) THEN id + 1
       WHEN id % 2 = 0 THEN id - 1
       ELSE id END AS id,
  student
FROM Seat
ORDER BY id;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("case") && s.includes("seat") && (s.includes("id+1") || s.includes("id + 1")); }
},

{
  id:45, title:"User Purchase Platform", diff:"Medium", cat:"Pivot",
  desc:`Write a query to find the total number of users and the total amount spent using mobile only, desktop only, and both mobile and desktop together for each date. If no data, output 0.`,
  schema:[{name:"Spending", cols:[["user_id","int","PK"],["spend_date","date","PK"],["platform","enum('mobile','desktop')","PK"],["amount","int",""]]}],
  examples:[{
    input:{Spending:["user_id,spend_date,platform,amount","1,2019-07-01,mobile,100","1,2019-07-01,desktop,100","2,2019-07-01,mobile,100","2,2019-07-02,mobile,100","3,2019-07-01,desktop,100","3,2019-07-02,desktop,100"]},
    output:"spend_date,platform,total_amount,total_users\n2019-07-01,desktop,100,1\n2019-07-01,mobile,100,1\n2019-07-01,both,200,1\n2019-07-02,desktop,100,1\n2019-07-02,mobile,100,1\n2019-07-02,both,0,0"
  }],
  hint:"Pivot: group by user+date, determine platform type (mobile/desktop/both using COUNT DISTINCT). Then UNION with a dates×platforms cross join to ensure all combos appear.",
  solution:`WITH user_platform AS (
  SELECT user_id, spend_date,
    CASE WHEN COUNT(DISTINCT platform) = 2 THEN 'both' ELSE MAX(platform) END AS platform,
    SUM(amount) AS amount
  FROM Spending GROUP BY user_id, spend_date
)
SELECT spend_date, 'desktop' AS platform, IFNULL(SUM(CASE WHEN platform='desktop' THEN amount END),0) AS total_amount, COUNT(CASE WHEN platform='desktop' THEN 1 END) AS total_users FROM user_platform GROUP BY spend_date
UNION ALL
SELECT spend_date, 'mobile', IFNULL(SUM(CASE WHEN platform='mobile' THEN amount END),0), COUNT(CASE WHEN platform='mobile' THEN 1 END) FROM user_platform GROUP BY spend_date
UNION ALL
SELECT spend_date, 'both', IFNULL(SUM(CASE WHEN platform='both' THEN amount END),0), COUNT(CASE WHEN platform='both' THEN 1 END) FROM user_platform GROUP BY spend_date
ORDER BY spend_date, platform;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("union") && s.includes("platform") && s.includes("both"); }
},
{

  solution:`SELECT DATE_FORMAT(trans_date, '%Y-%m') AS month, country,

{
  id:47, title:"Find the Missing IDs", diff:"Medium", cat:"Recursive CTE",
  desc:`Write a query to find the missing customer IDs. The missing IDs are ones that are not in the Customers table but are in the range between 1 and the maximum customer_id present in the table.`,
  schema:[{name:"Customers", cols:[["customer_id","int","PK"],["customer_name","varchar",""]]}],

  hint:"Generate a sequence 1..MAX(customer_id) using a recursive CTE. Then LEFT JOIN to Customers and find NULLs.",
  solution:`WITH RECURSIVE seq AS (

{
  id:48, title:"Restaurant Growth", diff:"Medium", cat:"Window Function",
  desc:`You are the restaurant owner and you want to analyze a possible expansion. Compute the moving average of how much the customer paid in a seven day window (current day + 6 days before). Return the average rounded to 2 decimal places. Order by visited_on.`,
  schema:[{name:"Customer", cols:[["customer_id","int",""],["name","varchar",""],["visited_on","date",""],["amount","int",""]]}],
  examples:[{
    input:{Customer:["customer_id,name,visited_on,amount","1,Jhon,2019-01-01,100","2,Daniel,2019-01-02,110","3,Jade,2019-01-03,120","4,Khaled,2019-01-04,130","5,Winston,2019-01-05,110","6,Elvis,2019-01-06,140","7,Anna,2019-01-07,150","8,Maria,2019-01-08,80","9,Jaze,2019-01-09,110"]},

  }],
  hint:"Aggregate by visited_on first. Then use SUM(amount) OVER (ORDER BY visited_on ROWS BETWEEN 6 PRECEDING AND CURRENT ROW) and filter from the 7th row onward.",
  solution:`WITH daily AS (

)
SELECT visited_on,

{

{
  id:50, title:"Product Price at a Given Date", diff:"Medium", cat:"Window Function",
  desc:`Write a query to find the prices of all products on 2019-08-16. Note that if a product did not change its price before 2019-08-16, its price is assumed to be 10.`,
  schema:[{name:"Products", cols:[["product_id","int","PK"],["new_price","int",""],["change_date","date","PK"]]}],
  examples:[{
    input:{Products:["product_id,new_price,change_date","1,20,2019-08-14","2,50,2019-08-14","1,30,2019-08-15","1,35,2019-08-16","2,65,2019-08-17","3,20,2019-08-18"]},
    output:"product_id,price\n2,50\n1,35\n3,10"
  }],
  hint:"For each product, find the most recent new_price WHERE change_date <= '2019-08-16'. For products with no such row, default to 10 using COALESCE or LEFT JOIN.",
  solution:`WITH latest AS (
  SELECT product_id, new_price
  FROM Products
  WHERE (product_id, change_date) IN (
    SELECT product_id, MAX(change_date)
    FROM Products WHERE change_date <= '2019-08-16'
    GROUP BY product_id
  )
)
SELECT p.product_id, COALESCE(l.new_price, 10) AS price
FROM (SELECT DISTINCT product_id FROM Products) p
LEFT JOIN latest l ON p.product_id = l.product_id;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("coalesce") && s.includes("2019-08-16"); }
},
{
  id:51, title:"Active Businesses", diff:"Medium", cat:"Window Function",
  desc:`Write a query to find all active businesses. An active business is one that has more than one event type where the occurrences is strictly greater than the average occurrences of that event type among all businesses.`,
  schema:[{name:"Events", cols:[["business_id","int","PK"],["event_type","varchar","PK"],["occurrences","int",""]]}],
  examples:[{
    input:{Events:["business_id,event_type,occurrences","1,reviews,7","3,reviews,3","1,ads,11","2,ads,7","3,ads,6","1,page views,3","2,page views,12"]},
    output:"business_id\n1"
  }],
  hint:"Calculate AVG(occurrences) per event_type. Join back, filter where occurrences > avg. Group by business_id having COUNT > 1.",
  solution:`WITH avg_events AS (
  SELECT event_type, AVG(occurrences) AS avg_occ
  FROM Events GROUP BY event_type
)
SELECT e.business_id
FROM Events e
JOIN avg_events a ON e.event_type = a.event_type
WHERE e.occurrences > a.avg_occ
GROUP BY e.business_id
HAVING COUNT(*) > 1;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("avg") && s.includes("having") && s.includes("count"); }
},
{
  id:52, title:"Last Person to Fit in the Bus", diff:"Medium", cat:"Window Function",
  desc:`There is a queue of people waiting to board a bus. The bus has a weight limit of 1000kg. Write a query to find the person_name of the last person that can fit in the bus without exceeding the weight limit.`,
  schema:[{name:"Queue", cols:[["person_id","int","PK"],["person_name","varchar",""],["weight","int",""],["turn","int",""]]}],
  examples:[{
    input:{Queue:["person_id,person_name,weight,turn","5,Alice,250,1","4,Bob,175,5","3,Alex,350,2","6,John Cena,400,3","1,Winston,500,6","2,Marie,200,4"]},
    output:"person_name\nAlex"
  }],
  hint:"Compute cumulative weight with SUM(weight) OVER (ORDER BY turn). Find the last row where cumulative_weight <= 1000.",
  solution:`WITH cumulative AS (

FROM cumulative

  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("sum") && s.includes("over") && s.includes("order by"); }

{
  id:54, title:"Number of Trusted Contacts of a Customer", diff:"Medium", cat:"Subquery",
  desc:`Write a query to find the trusted contacts count and invoice details for each customer's invoice. A trusted contact is a contact who is also a registered customer.`,
  schema:[
    {name:"Customers", cols:[["customer_id","int","PK"],["customer_name","varchar",""],["email","varchar",""]]},
    {name:"Contacts", cols:[["user_id","int","FK"],["contact_name","varchar",""],["contact_email","varchar",""]]},

  ],
  examples:[{

  hint:"JOIN Invoices→Customers. LEFT JOIN Contacts on user_id. Count contacts and trusted (contact_email IN customers emails). GROUP BY invoice.",
  solution:`SELECT i.invoice_id, c.customer_name, i.price,

{

{
  id:59, title:"Consecutive Numbers (Three+)", diff:"Medium", cat:"LAG/LEAD",
  desc:`Find all numbers that appear at least three times consecutively in a table. This time, use window functions (LAG/LEAD) instead of self-joins.`,
  schema:[{name:"Logs", cols:[["id","int","PK"],["num","int",""]]}],
  examples:[{
    input:{Logs:["id,num","1,1","2,1","3,1","4,2","5,1","6,2","7,2"]},
    output:"ConsecutiveNums\n1"
  }],
  hint:"Use LAG(num,1) and LAG(num,2) OVER (ORDER BY id). When current = lag1 = lag2, that number appears 3 times consecutively.",
  solution:`WITH lagged AS (
  SELECT num,
    LAG(num,1) OVER (ORDER BY id) AS prev1,
    LAG(num,2) OVER (ORDER BY id) AS prev2
  FROM Logs
)
SELECT DISTINCT num AS ConsecutiveNums

WHERE num = prev1 AND num = prev2;`,

{
  id:61, title:"Find Median Given Frequency of Numbers", diff:"Medium", cat:"Window Function",
  desc:`The Numbers table keeps the value and its frequency. Write a query to find the median of all the numbers. The median is the middle value; if there's an even count, return the average of two middle values.`,
  schema:[{name:"Numbers", cols:[["num","int","PK"],["frequency","int",""]]}],
  examples:[{
    input:{Numbers:["num,frequency","0,7","1,1","2,3","3,1"]},
    output:"median\n0.0000"
  }],
  hint:"Compute cumulative frequency and total. The median is at position total/2. Find where cumulative covers that position.",
  solution:`SELECT AVG(num) AS median
FROM (
  SELECT num,
    SUM(frequency) OVER (ORDER BY num) AS cum_freq,
    SUM(frequency) OVER (ORDER BY num DESC) AS rev_cum_freq,
    SUM(frequency) OVER () AS total_freq
  FROM Numbers
) t
WHERE cum_freq >= total_freq / 2 AND rev_cum_freq >= total_freq / 2;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("frequency") && (s.includes("over") || s.includes("median")); }
},
{

    {name:"Books", cols:[["book_id","int","PK"],["name","varchar",""],["available_from","date",""]]},

{
  id:63, title:"Evaluate Boolean Expression", diff:"Medium", cat:"Self JOIN",
  desc:`Write a query to evaluate boolean expressions stored in a table. Each expression has left_operand, operator ('>', '<', '='), and right_operand. Variables store their current values in another table.`,
  schema:[
    {name:"Variables", cols:[["name","varchar","PK"],["value","int",""]]},
    {name:"Expressions", cols:[["left_operand","varchar","PK"],["operator","enum('>','<','=')","PK"],["right_operand","varchar","PK"]]}
  ],
  examples:[{
    input:{Variables:["name,value","x,66","y,77"],Expressions:["left_operand,operator,right_operand","x,>,y","x,<,y","x,=,y","y,>,x","y,<,x","x,=,x"]},
    output:"left_operand,operator,right_operand,value\nx,>,y,false\nx,<,y,true\nx,=,y,false\ny,>,x,true\ny,<,x,false\nx,=,x,true"
  }],
  hint:"JOIN Variables twice (for left and right). Then CASE WHEN operator='>' THEN IF(lv.value>rv.value,'true','false') ...",
  solution:`SELECT e.left_operand, e.operator, e.right_operand,
  CASE
    WHEN e.operator = '>' THEN IF(lv.value > rv.value, 'true', 'false')
    WHEN e.operator = '<' THEN IF(lv.value < rv.value, 'true', 'false')
    ELSE IF(lv.value = rv.value, 'true', 'false')
  END AS value
FROM Expressions e
JOIN Variables lv ON e.left_operand = lv.name
JOIN Variables rv ON e.right_operand = rv.name;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("operator") && s.includes("case") && s.includes("join"); }
},

{

{
  id:67, title:"Game Play Analysis IV", diff:"Medium", cat:"Window Function",

{

{
  id:69, title:"Queries Quality and Percentage", diff:"Medium", cat:"Aggregation",
  desc:`We define query quality as the average of the ratio between query rating and its position. We define poor query percentage as the percentage of all queries with rating less than 3. Write a query to find each query_name's quality (round 2dp) and poor_query_percentage (round 2dp).`,
  schema:[{name:"Queries", cols:[["query_name","varchar",""],["result","varchar",""],["position","int",""],["rating","int",""]]}],
  examples:[{
    input:{Queries:["query_name,result,position,rating","Dog,Golden Retriever,1,5","Dog,German Shepherd,2,5","Dog,Mule,200,1","Cat,Shirazi,5,2","Cat,Siamese,3,3","Cat,Sphynx,7,4"]},

{
  id:70, title:"Count Apples and Oranges", diff:"Medium", cat:"JOIN",

{

{
  id:72, title:"Generate the Invoice", diff:"Medium", cat:"Aggregation",
  desc:`Write a query to show the details of the invoice with the highest price. If two or more invoices have the same price, return the one with the smallest invoice_id.`,
  schema:[
    {name:"Products", cols:[["product_id","int","PK"],["price","int",""]]},
    {name:"Purchases", cols:[["invoice_id","int",""],["product_id","int",""],["quantity","int",""]]}
  ],
  examples:[{
    input:{Products:["product_id,price","1,100","2,200","3,300"],Purchases:["invoice_id,product_id,quantity","1,1,2","1,2,2","2,2,2","2,3,2","3,1,2","3,2,2"]},
    output:"invoice_id,product_id,quantity,price\n2,2,2,400\n2,3,2,600"
  }],
  hint:"Compute total per invoice, find the invoice with MAX total (MIN id if tie). Then return all rows for that invoice_id with prices.",
  solution:`WITH totals AS (
  SELECT invoice_id, SUM(p.price * pu.quantity) AS total
  FROM Purchases pu JOIN Products p ON pu.product_id = p.product_id
  GROUP BY invoice_id
),
best AS (
  SELECT invoice_id FROM totals
  WHERE total = (SELECT MAX(total) FROM totals)
  ORDER BY invoice_id LIMIT 1
)
SELECT pu.invoice_id, pu.product_id, pu.quantity, p.price * pu.quantity AS price
FROM Purchases pu JOIN Products p ON pu.product_id = p.product_id
WHERE pu.invoice_id = (SELECT invoice_id FROM best);`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("max") && s.includes("invoice_id") && s.includes("sum"); }
},

{

  desc:`Write a query to find the cancellation rate of requests with unbanned users (both client and driver must not be banned) each day between '2013-10-01' and '2013-10-03'. Round to 2 decimal places.`,
  schema:[
    {name:"Trips", cols:[["id","int","PK"],["client_id","int","FK"],["driver_id","int","FK"],["city_id","int",""],["status","enum",""],["request_at","date",""]]},

{
  id:74, title:"Department Top Three Salaries (Hard)", diff:"Hard", cat:"Window Function",

)

{

{
  id:76, title:"Report Contiguous Dates", diff:"Hard", cat:"Island Problem",
  desc:`A system is running one task every day. Every task is independent of the previous tasks. The tasks can fail or succeed. Write a query to generate a report of period_state for each continuous interval of days in the period from 2019-01-01 to 2019-12-31. Round to day level.`,
  schema:[
    {name:"Failed", cols:[["fail_date","date","PK"]]},
    {name:"Succeeded", cols:[["success_date","date","PK"]]}
  ],
  examples:[{
    input:{Failed:["fail_date","2018-12-28","2018-12-29","2019-01-04","2019-01-05"],Succeeded:["success_date","2018-12-30","2018-12-31","2019-01-01","2019-01-02","2019-01-03","2019-01-06"]},
    output:"period_state,start_date,end_date\nsucceeded,2019-01-01,2019-01-03\nfailed,2019-01-04,2019-01-05\nsucceeded,2019-01-06,2019-01-06"
  }],
  hint:"UNION both tables with a state label. Filter to 2019. Apply the island pattern: row_number minus date gives a constant for consecutive dates. GROUP BY state+group.",
  solution:`WITH all_dates AS (
  SELECT 'failed' AS state, fail_date AS dt FROM Failed
  WHERE fail_date BETWEEN '2019-01-01' AND '2019-12-31'
  UNION ALL
  SELECT 'succeeded', success_date FROM Succeeded
  WHERE success_date BETWEEN '2019-01-01' AND '2019-12-31'
),
grouped AS (
  SELECT state, dt,
    DATE_SUB(dt, INTERVAL ROW_NUMBER() OVER (PARTITION BY state ORDER BY dt) DAY) AS grp
  FROM all_dates
)
SELECT state AS period_state, MIN(dt) AS start_date, MAX(dt) AS end_date
FROM grouped
GROUP BY state, grp
ORDER BY start_date;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("row_number") && s.includes("union") && s.includes("date_sub"); }
},
{
  id:77, title:"Active Users", diff:"Hard", cat:"Window Function",
  desc:`Write a query to find the id and name of active users. Active users are those who logged in to their accounts for 5 or more consecutive days. Return the result sorted by id.`,
  schema:[{name:"Accounts", cols:[["id","int","PK"],["name","varchar",""],["login_date","date",""]]}],
  examples:[{
    input:{Accounts:["id,name,login_date","1,Winston,2020-07-01","7,Jonathan,2020-09-01","1,Winston,2020-07-02","1,Winston,2020-07-04","7,Jonathan,2020-09-02","7,Jonathan,2020-09-03","7,Jonathan,2020-09-04","7,Jonathan,2020-09-05"]},
    output:"id,name\n7,Jonathan"
  }],
  hint:"Island problem: date - ROW_NUMBER() OVER (PARTITION BY id ORDER BY login_date) gives a constant group. HAVING COUNT(*) >= 5 in any group.",
  solution:`WITH grp AS (
  SELECT DISTINCT id, login_date,
    DATE_SUB(login_date, INTERVAL ROW_NUMBER() OVER (PARTITION BY id ORDER BY login_date) DAY) AS g
  FROM Accounts
)
SELECT DISTINCT a.id, a.name
FROM Accounts a
WHERE a.id IN (
  SELECT id FROM grp GROUP BY id, g HAVING COUNT(*) >= 5
)

  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("row_number") && s.includes("having") && s.includes("5"); }

{
  id:78, title:"Sales by Day of the Week", diff:"Hard", cat:"Pivot",
  desc:`Write a query to report the total sold amounts of each item on each day of the week. The item name should be the output row, and each day of the week should be an output column.`,
  schema:[
    {name:"Orders", cols:[["order_id","int","PK"],["customer_id","int",""],["order_date","date","FK"],["item_id","varchar","FK"],["quantity","int",""]]},

  examples:[{

  hint:"JOIN Orders+Items. Use DAYOFWEEK() which returns 1=Sun,2=Mon,..7=Sat. Conditional SUM per weekday. GROUP BY item_category.",
  solution:`SELECT item_category AS Category,
  SUM(IF(DAYOFWEEK(order_date)=2, quantity, 0)) AS Monday,
  SUM(IF(DAYOFWEEK(order_date)=3, quantity, 0)) AS Tuesday,
  SUM(IF(DAYOFWEEK(order_date)=4, quantity, 0)) AS Wednesday,

{
  id:79, title:"Tournament Winners", diff:"Hard", cat:"Window Function",
  desc:`The winner in each group is the player who scored the maximum total points within the group. In the case of a tie, the lower player_id wins. Write a query to find the winner in each group.`,
  schema:[
    {name:"Players", cols:[["player_id","int","PK"],["group_id","int",""]]},
    {name:"Matches", cols:[["match_id","int","PK"],["first_player","int","FK"],["second_player","int","FK"],["first_score","int",""],["second_score","int",""]]}
  ],
  examples:[{
    input:{Players:["player_id,group_id","15,1","25,1","30,1","45,1","10,2","35,2","50,2","20,3","40,3"],Matches:["match_id,first_player,second_player,first_score,second_score","1,15,45,3,0","2,30,25,1,2","3,30,15,2,0","4,40,20,5,2","5,35,50,1,1"]},
    output:"group_id,player_id\n1,15\n2,35\n3,40"
  }],
  hint:"Combine all scores per player (UNION first and second). Join to Players for group. SUM scores, RANK by score desc then player_id asc per group. Pick rank=1.",
  solution:`WITH scores AS (
  SELECT first_player AS pid, first_score AS score FROM Matches
  UNION ALL
  SELECT second_player, second_score FROM Matches
),
totals AS (
  SELECT p.group_id, s.pid, SUM(s.score) AS total
  FROM scores s JOIN Players p ON s.pid = p.player_id
  GROUP BY p.group_id, s.pid
),
ranked AS (
  SELECT *, RANK() OVER (PARTITION BY group_id ORDER BY total DESC, pid ASC) AS rnk
  FROM totals
)
SELECT group_id, pid AS player_id FROM ranked WHERE rnk = 1;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("rank") && s.includes("partition by") && s.includes("union"); }
},
{

{
  id:81, title:"Market Analysis II", diff:"Hard", cat:"Window Function",
  desc:`Write a query to find for each user, whether the brand of the second item (by order date) they sold is their favorite brand. Return user_id, and 'yes' or 'no'.`,
  schema:[
    {name:"Users", cols:[["user_id","int","PK"],["join_date","date",""],["favorite_brand","varchar",""]]},
    {name:"Orders", cols:[["order_id","int","PK"],["order_date","date",""],["item_id","int","FK"],["buyer_id","int","FK"],["seller_id","int","FK"]]},

  ],
  examples:[{

  }],
  hint:"ROW_NUMBER() OVER (PARTITION BY seller_id ORDER BY order_date) = 2 to get second sold item. LEFT JOIN to Items, compare brand to favorite_brand.",
  solution:`WITH ranked AS (

{
  id:82, title:"Find the Quiet Students in All Exams", diff:"Hard", cat:"Window Function",
  desc:`A quiet student is one who took at least one exam and did not score the highest or lowest score in any of the exams they took. Write a query to find the names of all quiet students, ordered by student_id.`,
  schema:[
    {name:"Student", cols:[["student_id","int","PK"],["student_name","varchar",""]]},
    {name:"Exam", cols:[["exam_id","int","PK"],["student_id","int","PK"],["score","int",""]]}
  ],
  examples:[{
    input:{Student:["student_id,student_name","1,Daniel","2,Jade","3,Stella","4,Jonathan","5,Will"],Exam:["exam_id,student_id,score","10,1,70","10,2,80","10,3,90","20,1,80","30,1,70","30,3,80","30,4,90","40,1,60","40,2,70","40,4,80"]},
    output:"student_id,student_name\n2,Jade"
  }],
  hint:"For each exam, find MIN and MAX score. A student is NOT quiet if they ever scored the min or max of any exam. Exclude those students.",
  solution:`WITH exam_mm AS (
  SELECT exam_id, MIN(score) AS mn, MAX(score) AS mx
  FROM Exam GROUP BY exam_id
),
loud AS (
  SELECT DISTINCT e.student_id
  FROM Exam e JOIN exam_mm m ON e.exam_id = m.exam_id
  WHERE e.score = m.mn OR e.score = m.mx
)
SELECT s.student_id, s.student_name
FROM Student s
JOIN (SELECT DISTINCT student_id FROM Exam) e ON s.student_id = e.student_id
WHERE s.student_id NOT IN (SELECT student_id FROM loud)
ORDER BY s.student_id;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("min") && s.includes("max") && s.includes("not in"); }
},
{
  id:83, title:"Human Traffic of Stadium (Hard)", diff:"Hard", cat:"Island Problem",

  schema:[{name:"Stadium", cols:[["id","int","PK"],["visit_date","date",""],["people","int",""]]}],

    input:{Stadium:["id,visit_date,people","1,2017-01-01,10","2,2017-01-02,109","3,2017-01-03,150","4,2017-01-04,99","5,2017-01-05,145","6,2017-01-06,1455","7,2017-01-07,199","8,2017-01-08,188"]},
    output:"id,visit_date,people\n5,2017-01-05,145\n6,2017-01-06,1455\n7,2017-01-07,199\n8,2017-01-08,188"
  }],
  hint:"Filter people>=100 first. Use island pattern: id - ROW_NUMBER() gives group id. Groups with COUNT>=3 are the answer.",
  solution:`WITH filtered AS (
  SELECT *, ROW_NUMBER() OVER (ORDER BY id) AS rn
  FROM Stadium WHERE people >= 100
),
islands AS (
  SELECT *, id - rn AS grp FROM filtered
),
big_islands AS (
  SELECT grp FROM islands GROUP BY grp HAVING COUNT(*) >= 3
)
SELECT id, visit_date, people
FROM islands WHERE grp IN (SELECT grp FROM big_islands)
ORDER BY visit_date;`,
  testFn: (sql) => { const s = sql.toLowerCase(); return s.includes("row_number") && s.includes("people") && s.includes("100"); }
